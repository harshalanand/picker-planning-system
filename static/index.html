function AnalyticsGantt({token,cfg}){
  const[detail,setDetail]=useState(null);const[loading,setLoading]=useState(false);
  // Read plan's own config from DB so Gantt is accurate even if Settings changed
  const[planCfg,setPlanCfg]=useState(null);
  useEffect(()=>{
    if(!token)return;
    setLoading(true);setDetail(null);
    apiFetch(`/api/plans/${token}`).then(d=>{
      setDetail(d);
      // Use config stored in plan (from when it was generated), fallback to current cfg
      try{
        const pc=d.meta?.config_json?JSON.parse(d.meta.config_json):null;
        setPlanCfg(pc||cfg);
      }catch{setPlanCfg(cfg);}
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[token]);
  if(loading)return<div className="ctr" style={{padding:40}}><Spin/></div>;
  if(!detail||!detail.details?.length)return<div className="al al-i">No plan details found for {token}.</div>;
  const s=planCfg||cfg;
  const machineCount=[...new Set(detail.details.map(d=>d.machine_no))].length;
  const overWH=detail.details.filter(d=>d.over_wh).length;
  return<div>
    <div className="g4" style={{gap:8,marginBottom:10}}>
      {[{l:'Total DOs',v:detail.details.length,c:'bl'},
        {l:'Machines',v:machineCount,c:'pu'},
        {l:'Over WH',v:overWH,c:overWH>0?'re':'gr'},
        {l:'Plan Start',v:detail.details[0]?.plan_start||detail.details[0]?.start_time||'—',c:'cy'}]
        .map(k=><div key={k.l} className={`kpi ${k.c}`} style={{padding:'8px 11px'}}>
          <div className="kl">{k.l}</div><div className="kv" style={{fontSize:'1rem'}}>{k.v}</div>
        </div>)}
    </div>
    <div className="al al-i" style={{marginBottom:9,fontSize:'.72rem'}}>
      Machine View: idle machines (lowest util%) at top — easy to spot underloaded machines.
      WH close line at <b>{`${String((s.wh_end||1020)/60|0).padStart(2,'0')}:${String((s.wh_end||1020)%60).padStart(2,'0')}`}</b>
      · Fill target <b>{s.fill_pct||70}%</b>
    </div>
    <GanttView details={detail.details} wsMin={s.start_min||480} weMin={s.wh_end||1020} fill={s.fill_pct||70}/>
  </div>;
}

function CancelStatusPage({toast}){
  const[plans,setPlans]=useState([]);const[sel,setSel]=useState('');
  const[detail,setDetail]=useState(null);const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);const[changes,setChanges]=useState({});
  const[flF,setFlF]=useState('all');const[stF,setStF]=useState('all');
  const[bulkO,setBulkO]=useState(false);const[bulkF,setBulkF]=useState(null);const[bulkS,setBulkS]=useState(false);
  const[bulkSt,setBulkSt]=useState('Cancelled');const[bulkR,setBulkR]=useState('');
  const SOPTS=['Planned','Done','Delayed','Not Picked','Cancelled'];
  const getAllowedStatuses=(currentStatus)=>{
    if(currentStatus==='Done')return[]; // Done is final — cannot be changed from frontend
    return['Cancelled','Not Picked','Delayed','Planned']; // No Done option to prevent accidental
  };
  const REASONS=['Picker absent','DO cancelled by WH','Merged with another DO','Stock unavailable','System error','End of shift','Other'];
  useEffect(()=>{apiFetch('/api/plans').then(setPlans).catch(e=>toast(e.message,'err'));},[]);
  const loadDet=async tok=>{setSel(tok);setDetail(null);setChanges({});if(!tok)return;
    setLoading(true);try{setDetail(await apiFetch(`/api/plans/${tok}`));}catch(e){toast(e.message,'err');}finally{setLoading(false);}};
  const rows=useMemo(()=>{
    if(!detail)return[];let r=detail.details;
    if(flF!=='all')r=r.filter(d=>String(d.floor)===flF);
    if(stF!=='all')r=r.filter(d=>(d.status||'Planned')===stF);
    return r;
  },[detail,flF,stF]);
  const setChg=(dn,f,v)=>setChanges(c=>({...c,[dn]:{...(c[dn]||{}),[f]:v}}));
  const pending=Object.values(changes).filter(v=>v.status).length;
  const floors=useMemo(()=>detail?[...new Set(detail.details.map(d=>d.floor))].sort():[],[detail]);
  const saveAll=async()=>{
    const upds=Object.entries(changes).filter(([,v])=>v.status).map(([dn,v])=>({do_no:dn,status:v.status,cancel_reason:v.reason||''}));
    if(!upds.length){toast('No changes to save','warn');return;}
    setSaving(true);
    try{const res=await apiFetch(`/api/status/${sel}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(upds)});
      toast(`✓ Updated ${res.updated} DOs — Cancelled DOs now free to re-plan`,'ok');setChanges({});loadDet(sel);
    }catch(e){toast(e.message,'err');}finally{setSaving(false);}};
  const bulkApply=async()=>{
    const upds=rows.map(d=>({do_no:d.do_no,status:bulkSt,cancel_reason:bulkR}));
    setSaving(true);
    try{const res=await apiFetch(`/api/status/${sel}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(upds)});
      toast(`✓ Applied ${res.updated} bulk updates`,'ok');setChanges({});loadDet(sel);
    }catch(e){toast(e.message,'err');}finally{setSaving(false);}};
  const bulkUpload=async()=>{
    if(!bulkF||!sel)return;setBulkS(true);
    try{const fd=new FormData();fd.append('file',bulkF);const res=await apiFetch(`/api/status/${sel}/bulk-upload`,{method:'POST',body:fd});
      if(res.success){toast(`✓ Updated ${res.updated} DOs`,'ok');loadDet(sel);setBulkO(false);}else toast(res.message,'err');
    }catch(e){toast(e.message,'err');}finally{setBulkS(false);}};

  return<div>
    <div className="al al-i" style={{marginBottom:13,fontSize:'.75rem'}}>
      ℹ️ <b>Cancelling a DO here immediately unlocks it</b> for re-planning on any date.
      Use Bulk Action to update many DOs at once, or change individual rows below.
    </div>
    <div className="g2" style={{gap:14,marginBottom:13}}>
      <div>
        <div className="sec">Select Plan</div>
        <select value={sel} onChange={e=>loadDet(e.target.value)} style={{marginBottom:11,fontSize:'.75rem'}}>
          <option value="">— Select plan token —</option>
          {plans.map(p=><option key={p.token} value={p.token}>{p.token} · {p.plan_date} · {p.total_dos} DOs</option>)}
        </select>
        <div className="exp">
          <div className="exp-h" onClick={()=>setBulkO(o=>!o)}>
            <span className="exp-ht">📥 Bulk Status Upload (Excel)</span>
            <span style={{color:'var(--muted)',fontSize:'.68rem'}}>{bulkO?'▲':'▼'}</span>
          </div>
          {bulkO&&<div className="exp-b">
            <div className="hint" style={{marginBottom:9}}>Download template → fill NEW_STATUS + CANCEL_REASON → re-upload</div>
            {sel&&<div style={{display:'flex',gap:7,alignItems:'center',marginBottom:9}}>
              <select id="statTplFilter" style={{height:31,width:'auto',fontSize:'.72rem'}}>
                <option value="All">All DOs</option>
                {['Planned','Done','Delayed','Not Picked','Cancelled'].map(s=><option key={s} value={s}>{s} only</option>)}
              </select>
              <a href="#" onClick={e=>{e.preventDefault();const f=document.getElementById('statTplFilter').value;window.location=`${API}/api/plans/${sel}/status-template-v2?status_filter=${encodeURIComponent(f)}`;}}>
                <button className="btn btn-g btn-sm">⬇️ Download Status Template</button>
              </a>
            </div>}
            <input type="file" accept=".xlsx,.xls" onChange={e=>setBulkF(e.target.files[0])} style={{marginBottom:8,fontSize:'.73rem'}}/>
            <button className="btn btn-p btn-sm" disabled={!bulkF||!sel||bulkS} onClick={bulkUpload}>
              {bulkS?<><Spin sm/>&nbsp;Uploading...</>:'💾 Upload & Apply'}
            </button>
          </div>}
        </div>
      </div>

      {detail&&<div>
        <div className="sec">Bulk Action on Filtered Rows ({rows.length} DOs)</div>
        <div className="g2" style={{gap:9,marginBottom:9}}>
          <div className="fg"><label className="lbl">Set All Filtered To</label>
            <select value={bulkSt} onChange={e=>setBulkSt(e.target.value)}>{SOPTS.map(s=><option key={s}>{s}</option>)}</select>
          </div>
          {(bulkSt==='Cancelled'||bulkSt==='Not Picked')&&<div className="fg"><label className="lbl">Reason</label>
            <select value={bulkR} onChange={e=>setBulkR(e.target.value)}>
              <option value="">— select —</option>{REASONS.map(r=><option key={r}>{r}</option>)}
            </select>
          </div>}
        </div>
        <button className="btn btn-d btn-sm" disabled={saving||!rows.length} onClick={bulkApply}>
          Apply {bulkSt} to {rows.length} DOs
        </button>
      </div>}
    </div>

    {loading&&<div className="ctr" style={{padding:32}}><Spin/></div>}
    {!loading&&detail&&<>
      <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:11,flexWrap:'wrap'}}>
        <select value={flF} onChange={e=>setFlF(e.target.value)} style={{height:31,width:'auto',fontSize:'.73rem'}}>
          <option value="all">All Floors</option>{floors.map(f=><option key={f} value={f}>Floor {f}</option>)}
        </select>
        <select value={stF} onChange={e=>setStF(e.target.value)} style={{height:31,width:'auto',fontSize:'.73rem'}}>
          <option value="all">All Statuses</option>{SOPTS.map(s=><option key={s}>{s}</option>)}
        </select>
        <span style={{fontSize:'.68rem',color:'var(--muted)'}}>{rows.length} DOs</span>
        <div style={{marginLeft:'auto',display:'flex',gap:7,alignItems:'center'}}>
          {pending>0&&<span style={{fontSize:'.68rem',color:'var(--gold)'}}>⚠ {pending} unsaved</span>}
          <button className="btn btn-p btn-sm" disabled={saving||!pending} onClick={saveAll}>
            {saving?<><Spin sm/>&nbsp;Saving...</>:`💾 Save ${pending} Changes`}
          </button>
        </div>
      </div>
      <div className="tw xl">
        <table className="dt"><thead><tr>
          <th>DO No</th><th>Floor</th><th>SEC</th><th>P#</th><th>QTY</th>
          <th>Current Status</th><th style={{background:'rgba(59,130,246,.06)',minWidth:135}}>New Status</th>
          <th style={{background:'rgba(59,130,246,.06)',minWidth:175}}>Cancel Reason</th><th>Cancelled At</th>
        </tr></thead><tbody>
          {rows.map(d=>{const ch=changes[d.do_no]||{};return<tr key={d.do_no} style={ch.status?{background:'rgba(59,130,246,.04)'}:{}}>
            <td style={{fontWeight:700}}>{d.do_no}</td><td><FL f={d.floor}/></td><td>{d.sec}</td>
            <td>P{d.priority}</td><td className="n">{(d.do_qty||0).toLocaleString()}</td>
            <td><SPill s={d.status||'Planned'}/></td>
            <td style={{background:'rgba(59,130,246,.025)'}}>
{(d.status||'Planned')==='Done'?
                <span style={{fontSize:'.65rem',color:'var(--green)',fontFamily:'var(--mono)',fontWeight:700,padding:'3px 8px',background:'rgba(16,185,129,.1)',borderRadius:4}}>✓ Done — locked</span>:
                <select value={ch.status||''} onChange={e=>setChg(d.do_no,'status',e.target.value)} style={{width:130,fontSize:'.7rem',padding:'3px 6px',border:ch.status?'1px solid var(--accent)':'1px solid var(--b2)'}}>
                  <option value="">— no change —</option>{getAllowedStatuses(d.status||'Planned').map(s=><option key={s}>{s}</option>)}
                </select>}
            </td>
            <td style={{background:'rgba(59,130,246,.025)'}}>
              {(ch.status==='Cancelled'||ch.status==='Not Picked')&&
                <select value={ch.reason||''} onChange={e=>setChg(d.do_no,'reason',e.target.value)} style={{width:170,fontSize:'.7rem',padding:'3px 6px'}}>
                  <option value="">— reason —</option>{REASONS.map(r=><option key={r}>{r}</option>)}
                </select>}
            </td>
            <td style={{fontSize:'.6rem',color:'var(--muted)'}}>{d.cancelled_at?d.cancelled_at.slice(0,10):'—'}</td>
          </tr>;})}
        </tbody></table>
      </div>
    </>}
  </div>;
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
const DEF_CFG={start_min:480,wh_end:1020,lunch_s:780,lunch_e:825,eff_min:495,bgt:3000,fill_pct:70,g1_min:3000,g2_min:2000,g3_min:1};
const NAV=[
  {id:'dashboard',ico:'📈',lbl:'Dashboard',     grp:'Overview'},
  {id:'plan',     ico:'🏭',lbl:'New Plan',       grp:'Planning'},
  {id:'history',  ico:'📚',lbl:'History',        grp:'Planning'},
  {id:'actual',   ico:'⏱',lbl:'Actual Times',   grp:'Operations'},
  {id:'analytics',ico:'📊',lbl:'Analytics',     grp:'Operations'},
  {id:'cancel',   ico:'🚫',lbl:'Cancel / Status',grp:'Operations'},
  {id:'settings', ico:'⚙️',lbl:'Settings',      grp:'System'},
  {id:'users',    ico:'👥',lbl:'Users',          grp:'System'},
  {id:'email',    ico:'✉️',lbl:'Email Reports',  grp:'System'},
  {id:'help',     ico:'❓',lbl:'Help & SOP',     grp:'System'},
  {id:'reports',  ico:'📑',lbl:'Reports',         grp:'System'},
];
const PSUB={dashboard:'Live KPIs, trends, scanner performance, completion stats',
  plan:'Upload DO+Machine Excel → run allocation',history:'Saved plans, download Excel, cancel plan',
  actual:'Record actual pick times vs planned schedule',analytics:'Completion %, floor & picker performance',
  cancel:'Update DO status · unlock cancelled DOs',settings:'Shift timing, capacity rules, algorithm reference',
  users:'User management — roles: admin, operator, viewer',
  email:'Email report configuration and schedules',
  help:'System logic, SOP, and user guide',reports:'Generate & download reports by token or date range'};

function App(){
  const[page,setPage]=useState('plan');
  const{toasts,toast}=useToast();
  const[cfg,setCfg]=useState(()=>{try{const s=localStorage.getItem('picker_cfg');return s?JSON.parse(s):DEF_CFG;}catch{return DEF_CFG;}});
  const[planCnt,setPlanCnt]=useState(null);
  const[auth,setAuth]=useState(()=>{try{const s=localStorage.getItem('picker_auth');return s?JSON.parse(s):null;}catch{return null;}});
  const[showLogin,setShowLogin]=useState(false);
  const saveAuth=(a)=>{setAuth(a);try{if(a)localStorage.setItem('picker_auth',JSON.stringify(a));else localStorage.removeItem('picker_auth');}catch{}};
  const logout=()=>{saveAuth(null);toast('Logged out','info');};
  const PROTECTED=['plan','cancel','users','email']; // pages requiring operator+
  const isOp=auth&&['operator','admin'].includes(auth.role);
  const isAdmin=auth&&auth.role==='admin';
  useEffect(()=>{apiFetch('/api/plans').then(p=>setPlanCnt(p.length)).catch(()=>{});},[page]);
  const m2t=m=>`${String(m/60|0).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  const grps=[...new Set(NAV.map(n=>n.grp))];
  const[collapsed,setCollapsed]=useState(()=>{try{return localStorage.getItem('sb_collapsed')==='1';}catch{return false;}});
  const toggleSb=()=>{const n=!collapsed;setCollapsed(n);try{localStorage.setItem('sb_collapsed',n?'1':'0');}catch{}};
  return<div className="layout">
    <aside className={`sb${collapsed?' collapsed':''}`}>
      <div className="sb-logo">
        {!collapsed&&<div className="sb-logo-txt">
          <div className="sb-title">PickerOS</div>
          <div className="sb-sub">Warehouse Planning System</div>
        </div>}
        {collapsed&&<div style={{margin:'0 auto',fontSize:'1.1rem'}}>🏭</div>}
        <button className="sb-toggle" onClick={toggleSb} title={collapsed?'Expand sidebar':'Collapse sidebar'}>
          {collapsed?'›':'‹'}
        </button>
      </div>
      {grps.map(g=><div key={g}>
        {!collapsed&&<div className="sb-sec">{g}</div>}
        {NAV.filter(n=>n.grp===g).map(n=><div key={n.id} data-tip={n.lbl} className={`sb-item${page===n.id?' on':''}`} onClick={()=>setPage(n.id)} title={collapsed?n.lbl:''}>
          <span className="sb-ico">{n.ico}</span>
          <span className="sb-lbl">{n.lbl}</span>
          {n.id==='history'&&planCnt!==null&&<span className="sb-badge">{planCnt}</span>}
        </div>)}
        {!collapsed&&<hr className="sb-div"/>}
        {collapsed&&<div style={{height:6}}/>}
      </div>)}
      <div className="sb-foot">
        {!collapsed&&<div className="sb-foot-txt">
          <div style={{marginBottom:2}}>v9.0 · FastAPI + React</div>
          <div style={{fontSize:'.56rem',display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/>
            API connected · SQLite WAL
          </div>
          <div style={{marginTop:3,fontSize:'.56rem',color:'var(--b3)'}}>
            BGT:{cfg.bgt.toLocaleString()} · Fill:{cfg.fill_pct}% · {m2t(cfg.start_min)}–{m2t(cfg.wh_end)} · Eff:{cfg.eff_min}m
          </div>
        </div>}
        {collapsed&&<div style={{textAlign:'center',padding:'2px 0'}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/>
        </div>}
      </div>
    </aside>
    <div className="main">
      <div className="topbar">
        <div>
          <div className="tb-title">{NAV.find(n=>n.id===page)?.ico} {NAV.find(n=>n.id===page)?.lbl}</div>
          <div style={{fontSize:'.62rem',color:'var(--muted)',marginTop:1}}>{PSUB[page]}</div>
        </div>
        <div className="tb-right">
          <span className="tb-tag">PKP System</span>
          <span className="tb-tag" style={{color:'var(--cyan)'}}>BGT {cfg.bgt.toLocaleString()}</span>
          <span className="tb-tag" style={{color:'var(--gold)'}}>Fill {cfg.fill_pct}%</span>
          <span className="tb-tag" style={{color:'var(--green)'}}>{m2t(cfg.start_min)}–{m2t(cfg.wh_end)}</span>
          {auth?<>
            <span className="tb-tag" style={{color:auth.role==='admin'?'var(--red)':auth.role==='operator'?'var(--accent)':'var(--muted)'}}>
              👤 {auth.username} <span style={{fontSize:'.5rem',opacity:.7}}>({auth.role})</span>
            </span>
            <button className="btn btn-g btn-xs" onClick={logout}>Logout</button>
          </>:
          <button className="btn btn-p btn-xs" onClick={()=>setShowLogin(true)}>🔐 Login</button>}
        </div>
      </div>
      <div className="content">
        {page==='dashboard' &&<DashboardPage toast={toast} cfg={cfg} setPage={setPage}/>}
        {page==='plan'      &&(isOp?<NewPlanPage cfg={cfg} toast={toast}/>:<AuthGate role="operator" onLogin={()=>setShowLogin(true)}/>)}
        {page==='history'   &&<HistoryPage toast={toast}/>}
        {page==='actual'    &&<ActualTimesPage toast={toast}/>}
        {page==='analytics' &&<AnalyticsPage toast={toast} cfg={cfg}/>}
        {page==='cancel'    &&(isOp?<CancelStatusPage toast={toast}/>:<AuthGate role="operator" onLogin={()=>setShowLogin(true)}/>)}
        {page==='settings'  &&<SettingsPage cfg={cfg} setCfg={setCfg} toast={toast}/>}
        {page==='users'     &&(isAdmin?<UsersPage toast={toast}/>:<AuthGate role="admin" onLogin={()=>setShowLogin(true)}/>)}
        {page==='email'     &&(isAdmin?<EmailPage toast={toast}/>:<AuthGate role="admin" onLogin={()=>setShowLogin(true)}/>)}
        {page==='help'      &&<HelpPage/>}
        {page==='reports'   &&<ReportsPage toast={toast}/>}
        {showLogin&&<LoginModal onSuccess={a=>{saveAuth(a);setShowLogin(false);toast(`Welcome ${a.username}!`,'ok');}} onClose={()=>setShowLogin(false)} toast={toast}/>}
      </div>
    </div>
    <Toasts toasts={toasts}/>
  </div>;
}

// ── AUTH COMPONENTS ──────────────────────────────────────────────────────────
function AuthGate({role,onLogin}){
  return<div className="card" style={{maxWidth:400,margin:'60px auto',textAlign:'center',padding:32}}>
    <div style={{fontSize:'2rem',marginBottom:12}}>🔐</div>
    <div style={{fontFamily:'var(--mono)',fontSize:'.9rem',fontWeight:700,marginBottom:8}}>Login Required</div>
    <div style={{fontSize:'.75rem',color:'var(--muted)',marginBottom:20}}>This page requires <b style={{color:'var(--accent)'}}>{role}</b> access.</div>
    <button className="btn btn-p btn-fw" onClick={onLogin}>Login</button>
  </div>;
}
function LoginModal({onSuccess,onClose,toast}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[loading,setLoading]=useState(false);
  const submit=async()=>{
    if(!u||!p){toast('Enter username and password','warn');return;}
    setLoading(true);
    try{
      const d=await apiFetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
      onSuccess(d);
    }catch(e){toast(e.message,'err');}finally{setLoading(false);}
  };
  return<div className="mb"><div className="mo" style={{width:360}}>
    <div className="mo-t">🔐 Login to PickerOS</div>
    <div style={{marginBottom:8}} className="fg"><label className="lbl">Username</label>
      <input type="text" value={u} onChange={e=>setU(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&submit()}/>
    </div>
    <div style={{marginBottom:16}} className="fg"><label className="lbl">Password</label>
      <input type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
    </div>
    <div style={{fontSize:'.65rem',color:'var(--muted)',marginBottom:14}}>Default: admin / admin123</div>
    <div className="mo-f">
      <button className="btn btn-g btn-sm" onClick={onClose}>Cancel</button>
      <button className="btn btn-p btn-sm" disabled={loading} onClick={submit}>{loading?<><Spin sm/>&nbsp;Logging in...</>:'Login'}</button>
    </div>
  </div></div>;
}

// ── DASHBOARD PAGE ────────────────────────────────────────────────────────────
function DashboardPage({toast,cfg,setPage}){

  const load=()=>{setLoading(true);apiFetch('/api/dashboard').then(d=>{setData(d);setLoading(false);}).catch(e=>{toast(e.message,'err');setLoading(false);});};
  useEffect(()=>{load();const t=setInterval(load,60000);return()=>clearInterval(t);},[]);
  if(loading&&!data)return<div className="ctr" style={{padding:60}}><Spin/></div>;
  if(!data)return<div className="al al-e">Failed to load dashboard</div>;
  const{today,yesterday,tomorrow,mtd,wtd,total,last_7_days,scanner_perf,floor_summary,recent_plans}=data;
  const todayPct=Math.round((today.done+today.delayed)/Math.max(today.dos_total,1)*100);
  const ytdPct=Math.round((yesterday.done+yesterday.delayed)/Math.max(yesterday.total,1)*100);
  const mtdPct=Math.round(mtd.dos_done/Math.max(mtd.dos_total,1)*100);
  const col_pct=p=>p>=80?'var(--green)':p>=50?'var(--gold)':'var(--red)';

    onMouseLeave={e=>{if(onClick)e.currentTarget.style.transform='none';}}>
    <div className="kl">{l}</div>
    <div className="kv">{v}</div>
    {s&&<div className="ks">{s}</div>}
    {badge&&<div style={{position:'absolute',top:6,right:8,fontSize:'.55rem',background:'var(--accent)',color:'#fff',padding:'1px 5px',borderRadius:8,fontFamily:'var(--mono)'}}>{badge}</div>}

  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <div>
        <div style={{fontFamily:'var(--mono)',fontSize:'.85rem',fontWeight:700}}>Live Dashboard</div>
        <div style={{fontSize:'.62rem',color:'var(--muted)'}}>Auto-refreshes every 60s · {new Date().toLocaleTimeString()}</div>
      </div>
      <button className="btn btn-g btn-sm" onClick={load}>↻ Refresh Now</button>
    </div>

    {/* ── TODAY ─────────────────────────────────────────────────────── */}
    <div className="sec">🏭 Today — {new Date().toISOString().slice(0,10)}</div>

    {/* Completion hero bar */}
    <div className="card" style={{marginBottom:10,padding:'14px 18px',background:'linear-gradient(135deg,var(--card),var(--card2))'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div>
          <div style={{fontSize:'.65rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.1em'}}>Today's Progress</div>
          <div style={{fontFamily:'var(--mono)',fontSize:'1.8rem',fontWeight:700,color:col_pct(todayPct)}}>{todayPct}%</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:'.9rem',fontWeight:700,color:'var(--green)'}}>{today.done} <span style={{fontSize:'.65rem',color:'var(--muted)'}}>Done</span></div>
          <div style={{fontFamily:'var(--mono)',fontSize:'.9rem',color:'var(--gold)'}}>{today.pending} <span style={{fontSize:'.65rem',color:'var(--muted)'}}>Pending</span></div>
          {today.delayed>0&&<div style={{fontFamily:'var(--mono)',fontSize:'.8rem',color:'var(--cyan)'}}>{today.delayed} <span style={{fontSize:'.6rem',color:'var(--muted)'}}>Delayed</span></div>}
        </div>
      </div>
      <div style={{height:12,background:'var(--border)',borderRadius:6,overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${todayPct}%`,background:col_pct(todayPct),borderRadius:6,transition:'width .5s'}}/>

          width:`${Math.round(today.delayed/Math.max(today.dos_total,1)*100)}%`,background:'var(--cyan)',opacity:.7}}/>}
      </div>
      <div style={{display:'flex',gap:14,marginTop:6,fontSize:'.62rem',color:'var(--muted)'}}>
        <span>QTY done: <b style={{color:'var(--green)',fontFamily:'var(--mono)'}}>{(today.qty_done||0).toLocaleString()}</b></span>
        <span>Total QTY: <b style={{fontFamily:'var(--mono)'}}>{(today.qty_total||0).toLocaleString()}</b></span>
        <span>Plans run: <b style={{fontFamily:'var(--mono)'}}>{today.plans}</b></span>

      <KCard l="Pending" v={today.pending} c="go" s="Not yet executed" onClick={()=>setPage&&setPage('cancel')}/>
      <KCard l="Delayed" v={today.delayed} c="cy" onClick={()=>setPage&&setPage('analytics')}/>
      <KCard l="Cancelled" v={today.cancelled} c="re" onClick={()=>setPage&&setPage('cancel')}/>
      <KCard l="Plans Run" v={today.plans} c="bl" onClick={()=>setPage&&setPage('history')}/>
      <KCard l="Machines" v={total.machines} c="pu" onClick={()=>setPage&&setPage('analytics')}/>
    </div>

    <div className="g3" style={{gap:12,marginBottom:12}}>
      {/* Yesterday */}
      <div className="card2" style={{borderLeft:'3px solid var(--muted)',padding:'12px 14px'}}>
        <div style={{fontSize:'.6rem',color:'var(--muted)',textTransform:'uppercase',fontWeight:700,marginBottom:8}}>📅 Yesterday</div>
        <div style={{fontFamily:'var(--mono)',fontSize:'1.4rem',fontWeight:700,color:col_pct(ytdPct)}}>{ytdPct}%</div>
        <div className="pb sl" style={{marginBottom:6}}>
          <div className="pbf" style={{width:`${ytdPct}%`,background:col_pct(ytdPct)}}/>
        </div>
        <div style={{display:'flex',gap:10,fontSize:'.65rem'}}>
          <span style={{color:'var(--green)'}}>{yesterday.done} Done</span>
          <span style={{color:'var(--gold)'}}>{yesterday.pending||0} Pending</span>
          {(yesterday.delayed||0)>0&&<span style={{color:'var(--cyan)'}}>{yesterday.delayed} Delayed</span>}
        </div>
        <div style={{fontSize:'.62rem',color:'var(--muted)',marginTop:3}}>
          QTY: <b style={{fontFamily:'var(--mono)',color:'var(--t2)'}}>{(yesterday.qty_done||0).toLocaleString()}</b>
        </div>
      </div>
      {/* Tomorrow planned */}
      <div className="card2" style={{borderLeft:`3px solid ${(tomorrow?.dos||0)>0?'var(--accent)':'var(--border)'}`,padding:'12px 14px',cursor:(tomorrow?.dos||0)>0?'pointer':'default'}}
        onClick={()=>(tomorrow?.dos||0)>0&&setPage&&setPage('history')}>
        <div style={{fontSize:'.6rem',color:'var(--muted)',textTransform:'uppercase',fontWeight:700,marginBottom:8}}>📅 Tomorrow Planned</div>
        {(tomorrow?.plans||0)>0?<>
          <div style={{fontFamily:'var(--mono)',fontSize:'1.4rem',fontWeight:700,color:'var(--accent)'}}>{tomorrow.dos}</div>
          <div style={{fontSize:'.68rem',color:'var(--t2)',marginTop:2}}>{tomorrow.plans} plan(s) · {(tomorrow.qty||0).toLocaleString()} pcs</div>
          <div style={{fontSize:'.62rem',color:'var(--muted)',marginTop:4}}>Click to view → History</div>
        </>:<div style={{fontSize:'.75rem',color:'var(--muted)',marginTop:8}}>
          No plans yet
          <div style={{marginTop:8}}><button className="btn btn-p btn-xs" onClick={e=>{e.stopPropagation();setPage&&setPage('plan');}}>+ Create Plan</button></div>
        </div>}
      </div>
      {/* WTD */}
      <div className="card2" style={{borderLeft:'3px solid var(--a3)',padding:'12px 14px'}}>
        <div style={{fontSize:'.6rem',color:'var(--muted)',textTransform:'uppercase',fontWeight:700,marginBottom:8}}>📆 Week-to-Date</div>
        <div style={{fontFamily:'var(--mono)',fontSize:'1.4rem',fontWeight:700,color:'var(--a3)'}}>{Math.round(wtd.dos_done/Math.max(wtd.dos_total,1)*100)}%</div>
        <div className="pb sl" style={{marginBottom:6}}>
          <div className="pbf" style={{width:`${Math.round(wtd.dos_done/Math.max(wtd.dos_total,1)*100)}%`,background:'var(--a3)'}}/>
        </div>
        <div style={{fontSize:'.65rem',color:'var(--t2)'}}>{wtd.dos_done} / {wtd.dos_total} DOs</div>
      </div>
    </div>

    {/* Floor today */}
    {floor_summary.length>0&&<>
      <div className="sec">🏢 Today — Floor Breakdown</div>
      <div className="card" style={{marginBottom:12,padding:'11px 14px'}}>
        <div style={{display:'grid',gridTemplateColumns:'50px 1fr 65px 65px 65px 65px 75px',gap:5,marginBottom:5,
          fontSize:'.52rem',color:'var(--muted)',textTransform:'uppercase',fontWeight:700,letterSpacing:'.07em'}}>
          <span>Floor</span><span>Progress</span><span style={{textAlign:'right'}}>Total</span>
          <span style={{textAlign:'right',color:'var(--green)'}}>Done</span>
          <span style={{textAlign:'right',color:'var(--gold)'}}>Pending</span>
          <span style={{textAlign:'right',color:'var(--red)'}}>Cancel</span>
          <span style={{textAlign:'right'}}>QTY</span>
        </div>
        {floor_summary.map(f=>{
          const active=f.total-(f.cancelled||0);
          const pct=Math.round((f.done||0)/Math.max(active,1)*100);
          const col=col_pct(pct);
          return<div key={f.floor} style={{display:'grid',gridTemplateColumns:'50px 1fr 65px 65px 65px 65px 75px',gap:5,
            alignItems:'center',padding:'5px 0',borderBottom:'1px solid rgba(26,37,53,.5)',cursor:'pointer'}}
            onClick={()=>setPage&&setPage('analytics')}>
            <FL f={f.floor}/>
            <div>
              <div style={{height:8,background:'var(--border)',borderRadius:4,overflow:'hidden',marginBottom:2}}>
                <div style={{height:'100%',width:`${pct}%`,background:col,borderRadius:4}}/>
              </div>
              <span style={{fontSize:'.54rem',color:col,fontFamily:'var(--mono)',fontWeight:700}}>{pct}%</span>
            </div>
            <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:'.68rem'}}>{f.total}</span>
            <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:'.68rem',color:'var(--green)',fontWeight:700}}>{f.done||0}</span>
            <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:'.68rem',color:'var(--gold)'}}>{f.pending||0}</span>
            <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:'.68rem',color:'var(--red)'}}>{f.cancelled||0}</span>
            <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:'.68rem',color:'var(--muted)'}}>{(f.qty||0).toLocaleString()}</span>
          </div>;
        })}
      </div>
    </>}

    <div className="g2" style={{gap:13,marginBottom:12}}>
      {/* 7-day trend */}
      <div>
        <div className="sec">📈 7-Day Trend</div>
        <div className="card" style={{padding:'12px 14px'}}>
          {last_7_days.map((d,i)=>{
            const mx=Math.max(...last_7_days.map(x=>x.total),1);
            const bW=Math.round(d.total/mx*100),dW=Math.round(d.done/mx*100);
            const dt=new Date(d.date+'T00:00:00');
            const isToday=d.date===new Date().toISOString().slice(0,10);
            const lbl=['Su','Mo','Tu','We','Th','Fr','Sa'][dt.getDay()]+' '+d.date.slice(5);
            return<div key={d.date} className="bc-row" style={{opacity:d.total===0?.4:1}}>
              <div style={{width:50,fontSize:'.6rem',color:isToday?'var(--accent)':'var(--muted)',fontWeight:isToday?700:400,fontFamily:'var(--mono)',flexShrink:0}}>{lbl}</div>
              <div className="bc-bar" style={{position:'relative'}}>
                <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${bW}%`,background:'rgba(59,130,246,.15)',borderRadius:3}}/>
                <div style={{position:'absolute',left:0,top:0,height:'100%',width:`${dW}%`,background:col_pct(d.pct),borderRadius:3,opacity:.85}}/>
                <span className="bc-val">{d.total>0?`${d.done}/${d.total} (${d.pct}%)`:'—'}</span>
              </div>
            </div>;
          })}
        </div>
      </div>

      {/* MTD summary */}
      <div>
        <div className="sec">📊 Month-to-Date</div>
        <div className="g2" style={{gap:8,marginBottom:8}}>
          {[{l:'Plans',v:mtd.plans,c:'bl',p:'history'},{l:'DOs Done',v:mtd.dos_done,c:'gr',p:'analytics'},
            {l:'Completion',v:`${mtdPct}%`,c:mtdPct>=80?'gr':'go',p:'analytics'},{l:'QTY Done',v:(mtd.qty_done||0).toLocaleString(),c:'cy',p:'analytics'}]
            .map(k=><KCard key={k.l} l={k.l} v={k.v} c={k.c} onClick={()=>setPage&&setPage(k.p)}/>)}
        </div>
        <div className="sec" style={{marginTop:10}}>🔢 All-Time</div>
        <div className="g2" style={{gap:8}}>
          {[{l:'Total Plans',v:total.plans,c:'bl',p:'history'},{l:'Total DOs Done',v:total.done,c:'gr',p:'analytics'},
            {l:'Total Machines',v:total.machines,c:'pu',p:'analytics'},{l:'All DOs',v:total.dos,c:'cy',p:'history'}]
            .map(k=><KCard key={k.l} l={k.l} v={k.v} c={k.c} s="" onClick={()=>setPage&&setPage(k.p)}/>)}
        </div>
      </div>
    </div>

    {/* Scanner MTD + Recent */}
    <div className="g2" style={{gap:13}}>
      {scanner_perf.length>0&&<div>
        <div className="sec" style={{display:'flex',justifyContent:'space-between'}}>
          <span>🔧 Scanner / Machine — MTD</span>
          <button className="btn btn-g btn-xs" onClick={()=>dlTableCSV(scanner_perf,'scanner_perf_mtd')}>⬇️ CSV</button>
        </div>
        <div className="tw tl">
          <table className="dt"><thead><tr>
            <th>Machine</th><th>Scanner</th><th>DOs</th><th>QTY</th><th>Done</th><th>Avg Util%</th>
          </tr></thead><tbody>
            {scanner_perf.map((s,i)=><tr key={i} style={{cursor:'pointer'}} onClick={()=>setPage&&setPage('analytics')}>
              <td style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:'.67rem'}}>{s.machine_no}</td>
              <td style={{fontSize:'.63rem',color:'var(--muted)'}}>{s.scanner_name||'—'}</td>
              <td className="n">{s.dos}</td>
              <td className="n">{(s.qty||0).toLocaleString()}</td>
              <td className="n" style={{color:'var(--green)',fontWeight:700}}>{s.done}</td>
              <td>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <div className="pb sl" style={{width:45}}>
                    <div className="pbf" style={{width:`${s.avg_util||0}%`,background:(s.avg_util||0)>=70?'var(--green)':'var(--gold)'}}/>
                  </div>
                  <span style={{fontSize:'.6rem',fontFamily:'var(--mono)',color:(s.avg_util||0)>=70?'var(--green)':'var(--gold)'}}>{s.avg_util}%</span>
                </div>
              </td>
            </tr>)}
          </tbody></table>
        </div>
      </div>}

      <div>
        <div className="sec" style={{display:'flex',justifyContent:'space-between'}}>
          <span>🕐 Recent Plans</span>
          <button className="btn btn-g btn-xs" onClick={()=>setPage&&setPage('history')}>View All →</button>
        </div>
        <div className="tw tl">
          <table className="dt"><thead><tr>
            <th>Token</th><th>Date</th><th>DOs</th><th>Done</th><th>Util%</th>
          </tr></thead><tbody>
            {recent_plans.map((p,i)=>{
              const pct=Math.round((p.done_count||0)/Math.max(p.total_dos,1)*100);
              return<tr key={i} style={{cursor:'pointer'}} onClick={()=>setPage&&setPage('analytics')}>
                <td style={{fontFamily:'var(--mono)',fontSize:'.65rem',color:'var(--accent)',fontWeight:700}}>{p.token}</td>
                <td style={{fontSize:'.65rem'}}>{p.plan_date}</td>
                <td className="n">{p.total_dos}</td>
                <td className="n">
                  <span style={{color:col_pct(pct),fontFamily:'var(--mono)',fontWeight:700}}>{p.done_count||0}</span>
                  <span style={{fontSize:'.55rem',color:'var(--muted)',marginLeft:3}}>{pct}%</span>
                </td>
                <td><div className="pb sl" style={{width:50}}>
                  <div className="pbf" style={{width:`${p.avg_util||0}%`,background:(p.avg_util||0)>=70?'var(--green)':'var(--gold)'}}/>
                </div></td>
              </tr>;
            })}
          </tbody></table>
        </div>
      </div>
    </div>
  </div>;
}

// ── USERS PAGE ────────────────────────────────────────────────────────────────
function UsersPage({toast}){
  const[users,setUsers]=useState([]);const[form,setForm]=useState({username:'',password:'admin123',role:'operator',email:''});
  const[editing,setEditing]=useState(null);
  const load=()=>apiFetch('/api/users').then(setUsers).catch(e=>toast(e.message,'err'));
  useEffect(()=>{load();},[]);
  const token=()=>JSON.parse(localStorage.getItem('picker_auth')||'{}').token||'';
  const authHdr=()=>({'Content-Type':'application/json','Authorization':`Bearer ${token()}`});
  const save=async()=>{
    try{
      if(editing){await apiFetch(`/api/users/${editing.id}`,{method:'PUT',headers:authHdr(),body:JSON.stringify(form)});}
      else{await apiFetch('/api/users',{method:'POST',headers:authHdr(),body:JSON.stringify(form)});}
      toast(editing?'User updated':'User created','ok');setEditing(null);setForm({username:'',password:'admin123',role:'operator',email:''});load();
    }catch(e){toast(e.message,'err');}
  };
  const deactivate=async(id)=>{
    try{await apiFetch(`/api/users/${id}`,{method:'PUT',headers:authHdr(),body:JSON.stringify({active:0})});toast('User deactivated','ok');load();}
    catch(e){toast(e.message,'err');}
  };
  const ROLES=[{v:'admin',l:'Admin — full access',c:'var(--red)'},{v:'operator',l:'Operator — plan + edit',c:'var(--accent)'},{v:'viewer',l:'Viewer — read only',c:'var(--muted)'}];
  return<div>
    <div className="g23" style={{gap:16}}>
      <div>
        <div className="sec">{editing?`Edit User: ${editing.username}`:'Add New User'}</div>
        <div className="sbox">
          {!editing&&<div className="fg" style={{marginBottom:9}}><label className="lbl">Username</label>
            <input value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))} placeholder="e.g. john.doe"/></div>}
          <div className="fg" style={{marginBottom:9}}><label className="lbl">Password {editing&&'(leave blank to keep current)'}</label>
            <input type="password" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))} placeholder={editing?"Unchanged":"New password"}/></div>
          <div className="fg" style={{marginBottom:9}}><label className="lbl">Role</label>
            <select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}>
              {ROLES.map(r=><option key={r.v} value={r.v}>{r.l}</option>)}
            </select></div>
          <div className="fg" style={{marginBottom:12}}><label className="lbl">Email (optional)</label>
            <input type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="user@company.com"/></div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-p btn-sm" onClick={save}>{editing?'💾 Update':'➕ Create'}</button>
            {editing&&<button className="btn btn-g btn-sm" onClick={()=>{setEditing(null);setForm({username:'',password:'admin123',role:'operator',email:''});}}>Cancel</button>}
          </div>
        </div>
        <div className="al al-i" style={{fontSize:'.7rem',marginTop:10}}>
          <b>Roles:</b> Admin = all access including user management.
          Operator = generate plans, edit actuals, cancel DOs.
          Viewer = read-only access to all pages (no login needed for viewing).
        </div>
      </div>
      <div>
        <div className="sec">All Users</div>
        <div className="tw md">
          <table className="dt"><thead><tr><th>Username</th><th>Role</th><th>Email</th><th>Status</th><th></th></tr></thead>
          <tbody>{users.map(u=><tr key={u.id} style={!u.active?{opacity:.5}:{}}>
            <td style={{fontFamily:'var(--mono)',fontWeight:700}}>{u.username}</td>
            <td><span style={{fontSize:'.65rem',fontWeight:700,color:u.role==='admin'?'var(--red)':u.role==='operator'?'var(--accent)':'var(--muted)'}}>{u.role}</span></td>
            <td style={{fontSize:'.63rem',color:'var(--muted)'}}>{u.email||'—'}</td>
            <td><span className={`pill ${u.active?'pD':'pC'}`}>{u.active?'Active':'Inactive'}</span></td>
            <td style={{display:'flex',gap:5}}>
              <button className="btn btn-g btn-xs" onClick={()=>{setEditing(u);setForm({username:u.username,password:'',role:u.role,email:u.email||''});}}>Edit</button>
              {u.active&&<button className="btn btn-d btn-xs" onClick={()=>deactivate(u.id)}>Deactivate</button>}
            </td>
          </tr>)}</tbody></table>
        </div>
      </div>
    </div>
  </div>;
}

// ── EMAIL PAGE ────────────────────────────────────────────────────────────────
function EmailPage({toast}){
  const[cfg,setCfgE]=useState({smtp_host:'',smtp_port:587,smtp_user:'',smtp_pass:'',from_addr:'',enabled:0});
  const[scheds,setScheds]=useState([]);const[newSch,setNewSch]=useState({report_type:'daily_summary',frequency:'daily',send_time:'08:00',date_from:'',date_to:'',recipients:'',enabled:1});
  const[testing,setTesting]=useState(false);const[testTo,setTestTo]=useState('');
  const token=()=>JSON.parse(localStorage.getItem('picker_auth')||'{}').token||'';
  const authHdr=()=>({'Content-Type':'application/json','Authorization':`Bearer ${token()}`});
  useEffect(()=>{
    apiFetch('/api/email/config').then(c=>{if(c&&Object.keys(c).length)setCfgE(prev=>({...prev,...c}));}).catch(()=>{});
    apiFetch('/api/email/schedules').then(setScheds).catch(()=>{});
  },[]);
  const saveConfig=async()=>{
    try{await apiFetch('/api/email/config',{method:'POST',headers:authHdr(),body:JSON.stringify(cfg)});toast('Email config saved','ok');}
    catch(e){toast(e.message,'err');}
  };
  const testEmail=async()=>{
    setTesting(true);
    try{await apiFetch('/api/email/test',{method:'POST',headers:authHdr(),body:JSON.stringify({to:testTo||cfg.smtp_user})});toast('Test email sent!','ok');}
    catch(e){toast(e.message,'err');}finally{setTesting(false);}
  };
  const saveSch=async()=>{
    try{await apiFetch('/api/email/schedules',{method:'POST',headers:authHdr(),body:JSON.stringify(newSch)});
      toast('Schedule saved','ok');apiFetch('/api/email/schedules').then(setScheds);}
    catch(e){toast(e.message,'err');}
  };
  const delSch=async(id)=>{
    try{await apiFetch(`/api/email/schedules/${id}`,{method:'DELETE',headers:authHdr()});
      toast('Deleted','ok');setScheds(s=>s.filter(x=>x.id!==id));}
    catch(e){toast(e.message,'err');}
  };
  const REPORT_TYPES=['daily_summary','hourly_status','weekly_performance','completion_alert','overdue_alert'];
  const FREQS=['hourly','daily','weekly','on_completion','on_overdue'];
  return<div>
    <div className="g2" style={{gap:16}}>
      <div>
        <div className="sec">SMTP Configuration</div>
        <div className="sbox">
          <div className="g2" style={{gap:8,marginBottom:8}}>
            <div className="fg"><label className="lbl">SMTP Host</label><input value={cfg.smtp_host||''} onChange={e=>setCfgE(c=>({...c,smtp_host:e.target.value}))} placeholder="smtp.gmail.com"/></div>
            <div className="fg"><label className="lbl">SMTP Port</label><input type="number" value={cfg.smtp_port||587} onChange={e=>setCfgE(c=>({...c,smtp_port:+e.target.value}))}/></div>
          </div>
          <div className="g2" style={{gap:8,marginBottom:8}}>
            <div className="fg"><label className="lbl">Username</label><input value={cfg.smtp_user||''} onChange={e=>setCfgE(c=>({...c,smtp_user:e.target.value}))} placeholder="your@email.com"/></div>
            <div className="fg"><label className="lbl">Password</label><input type="password" value={cfg.smtp_pass||''} onChange={e=>setCfgE(c=>({...c,smtp_pass:e.target.value}))} placeholder="App password"/></div>
          </div>
          <div className="fg" style={{marginBottom:8}}><label className="lbl">From Address</label><input value={cfg.from_addr||''} onChange={e=>setCfgE(c=>({...c,from_addr:e.target.value}))} placeholder="PickerOS <noreply@company.com>"/></div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <input type="checkbox" checked={!!cfg.enabled} onChange={e=>setCfgE(c=>({...c,enabled:e.target.checked?1:0}))}/><label style={{fontSize:'.73rem'}}>Enable email sending</label>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-p btn-sm" onClick={saveConfig}>💾 Save Config</button>
            <input placeholder="Test recipient email" value={testTo} onChange={e=>setTestTo(e.target.value)} style={{width:200,height:32,fontSize:'.72rem'}}/>
            <button className="btn btn-g btn-sm" disabled={testing} onClick={testEmail}>{testing?<><Spin sm/>&nbsp;</>:'📧 Send Test'}</button>
          </div>
        </div>
        <div className="al al-i" style={{fontSize:'.7rem',marginTop:8}}>
          For Gmail: use App Passwords (not your regular password). Enable 2FA first, then generate an app password at myaccount.google.com.
        </div>
      </div>
      <div>
        <div className="sec">Report Schedules</div>
        <div className="sbox">
          <div className="g2" style={{gap:8,marginBottom:8}}>
            <div className="fg"><label className="lbl">Report Type</label>
              <select value={newSch.report_type} onChange={e=>setNewSch(s=>({...s,report_type:e.target.value}))}>
                {REPORT_TYPES.map(t=><option key={t}>{t}</option>)}
              </select></div>
            <div className="fg"><label className="lbl">Frequency</label>
              <select value={newSch.frequency} onChange={e=>setNewSch(s=>({...s,frequency:e.target.value}))}>
                {FREQS.map(f=><option key={f}>{f}</option>)}
              </select></div>
          </div>
          <div className="g2" style={{gap:8,marginBottom:8}}>
            <div className="fg"><label className="lbl">Send Time (HH:MM)</label>
              <input type="time" value={newSch.send_time||'08:00'} onChange={e=>setNewSch(s=>({...s,send_time:e.target.value}))}/></div>
            <div className="fg"><label className="lbl">Recipients</label>
              <input value={newSch.recipients} onChange={e=>setNewSch(s=>({...s,recipients:e.target.value}))} placeholder="a@b.com,c@d.com"/></div>
          </div>
          {['daily','weekly'].includes(newSch.frequency)&&<div className="g2" style={{gap:8,marginBottom:8}}>
            <div className="fg"><label className="lbl">Date From (optional)</label>
              <input type="date" value={newSch.date_from||''} onChange={e=>setNewSch(s=>({...s,date_from:e.target.value}))}/></div>
            <div className="fg"><label className="lbl">Date To (optional)</label>
              <input type="date" value={newSch.date_to||''} onChange={e=>setNewSch(s=>({...s,date_to:e.target.value}))}/></div>
          </div>}
          <button className="btn btn-p btn-sm" onClick={saveSch}>➕ Add Schedule</button>
        </div>
        <div className="tw md" style={{marginTop:8}}>
          <table className="dt"><thead><tr><th>Type</th><th>Freq</th><th>Send At</th><th>Recipients</th><th>Status</th><th></th></tr></thead>
          <tbody>{scheds.map(s=><tr key={s.id}>
            <td style={{fontSize:'.65rem',color:'var(--accent)'}}>{s.report_type}</td>
            <td style={{fontSize:'.65rem'}}>{s.frequency}</td>
            <td style={{fontFamily:'var(--mono)',fontSize:'.65rem',color:'var(--cyan)'}}>{s.send_time||'08:00'}</td>
            <td style={{fontSize:'.62rem',color:'var(--muted)',maxWidth:130,overflow:'hidden',textOverflow:'ellipsis'}}>{s.recipients}</td>
            <td><span className={`pill ${s.enabled?'pD':'pC'}`}>{s.enabled?'Active':'Off'}</span></td>
            <td><button className="btn btn-d btn-xs" onClick={()=>delSch(s.id)}>✕</button></td>
          </tr>)}</tbody></table>
        </div>
      </div>
    </div>
  </div>;
}

// ── HELP PAGE ─────────────────────────────────────────────────────────────────
function HelpPage(){
  const sections=[
    {t:'System Overview',ico:'🏭',c:'var(--accent)',items:[
      ['What is PickerOS?','A warehouse DO (Delivery Order) allocation system. Given a list of DOs and picking machines, it generates a minute-by-minute schedule assigning each DO to a machine with exact start/end times.'],
      ['Supported platforms','Windows, Linux, Mac. Runs on any machine with Python 3.9+. No internet required after setup.'],
      ['Database','SQLite (picker_planning.db) — auto-created on first run. No separate database server needed.'],
    ]},
    {t:'Input File Format',ico:'📋',c:'var(--green)',items:[
      ['DO Sheet (required columns)','DO_NO, FLOOR, PRIORITY, DO_QTY, SEC. Optional: STO_NO, ST_CD, ST_NM.'],
      ['MACHINE Sheet (required columns)','MACHINE_NO. Optional but recommended: BGT_PICKER (capacity), SCANNER_NAME, FLOOR.'],
      ['File format','Excel .xlsx or .xls with two sheets named DO and MACHINE (or containing those words).'],
      ['PRIORITY','Numeric. Lower number = higher priority. P1 is always allocated before P2, P3, etc.'],
      ['DO_QTY','Total pieces in the DO. Used to calculate how long picking takes on each machine.'],
    ]},
    {t:'Shift & Time Rules',ico:'⏰',c:'var(--gold)',items:[
      ['Shift Start','Default 08:00. New machines start here unless plan is generated mid-shift (then starts from current time).'],
      ['Warehouse Close','Default 17:00. DOs ending after this are flagged "Over WH" but not dropped.'],
      ['Lunch Break','Default 13:00–13:45. Allocator automatically skips this window — DOs spanning lunch get extended accordingly.'],
      ['Effective Minutes','(WH_Close − Shift_Start) − Lunch_Duration = 495 min by default.'],
      ['PCS/Min','BGT_MACHINE ÷ Effective Minutes. Used to calculate each DO\'s duration.'],
      ['Mid-shift planning','If you run the plan on today\'s date after shift start, new machines start from current time (rounded to 5 min).'],
    ]},
    {t:'Machine Groups & Allocation Logic',ico:'⚙️',c:'var(--a3)',items:[
      ['G1 / G2 / G3','Labels only — based on BGT_PICKER. G1 ≥ 3000 pcs, G2 ≥ 2000, G3 < 2000. Configurable in Settings.'],
      ['Allocation rule','Unified pool — all machines compete for all DOs. Highest capacity machines naturally get more work.'],
      ['Machine selection','For each DO: find machines with enough remaining capacity → pick the one free earliest. Tiebreak: largest remaining capacity wins.'],
      ['DO order','Within each floor: PRIORITY ASC → SEC ASC → DO_NO ASC. P1 DOs always allocated before P2.'],
      ['No splitting','Each DO is assigned to exactly one machine. DOs are never split across machines.'],
      ['Overflow pool','If a floor\'s assigned machines run full, the system pulls from unassigned machines automatically.'],
    ]},
    {t:'Multi-Run & DO Locking',ico:'🔒',c:'var(--cyan)',items:[
      ['Lock rule','A DO with status Planned/Done/Delayed/Not Picked is locked — excluded from future runs.'],
      ['Unlock','Set status to Cancelled. The DO becomes available for re-planning immediately.'],
      ['Cancel vs Not Picked','Cancelled = unlocks the DO. Not Picked = acknowledges it wasn\'t done but keeps it locked (must cancel to replan).'],
      ['Multi-run','Generate R01 in the morning, R02 afternoon. R02 sees only DOs not in R01. Machines continue from where R01 left off.'],
      ['Time slot freeing','When you cancel DOs, picker_day_state is rebuilt automatically — freed machines start from correct times in next run.'],
    ]},
    {t:'Status Lifecycle',ico:'📊',c:'var(--green)',items:[
      ['Planned','Auto-set on allocation. DO is scheduled, not yet executed.'],
      ['Done','Set manually. Picking completed on time. Keeps DO locked.'],
      ['Delayed','Set manually or auto-set if actual_date > plan_date. Keeps DO locked.'],
      ['Not Picked','DO was not executed. Keeps DO locked — must cancel to replan.'],
      ['Cancelled','DO freed for re-planning. Picker state rebuilt automatically.'],
    ]},
    {t:'Actual Times',ico:'⏱',c:'var(--gold)',items:[
      ['How to enter','Go to Actual Times page → select plan → select floor/picker → fill start and end times.'],
      ['Bulk upload','Download template → fill ACTUAL_DATE, ACTUAL_START, ACTUAL_END → re-upload.'],
      ['Auto-status update','When actuals are saved: if actual_date > plan_date → status set to Delayed, else Done.'],
      ['Variance','Actual Duration − Planned Duration. Negative = faster than planned.'],
    ]},
    {t:'User Roles & Auth',ico:'👥',c:'var(--red)',items:[
      ['Viewer','No login needed. Can view all pages except generate/edit/admin.'],
      ['Operator','Login required. Can generate plans, enter actuals, cancel/update status.'],
      ['Admin','Login required. Full access including user management, email config, settings.'],
      ['Default credentials','admin / admin123 — change immediately after setup.'],
    ]},
    {t:'SOP — Daily Workflow',ico:'📌',c:'var(--pink)',items:[
      ['Step 1 — Morning plan','Upload template Excel → check Machine Availability panel → verify fill% in Settings → Run Allocation.'],
      ['Step 2 — Distribute','Download Plan Excel → share PICKER_SCHEDULE sheet with floor supervisors.'],
      ['Step 3 — Execute','Floor staff pick DOs as per schedule. Note actual start/end times on paper or device.'],
      ['Step 4 — Update actuals','Enter actual times in Actual Times page (or bulk upload via Excel template).'],
      ['Step 5 — EOD review','Analytics page → check Completion %, identify delayed/not-picked DOs.'],
      ['Step 6 — Carry-forward','DOs not picked → cancel them → generate fresh plan for next day including them.'],
    ]},
  ];
  const[open,setOpen]=useState({});
  return<div>
    <div className="al al-i" style={{marginBottom:14,fontSize:'.75rem'}}>
      Complete reference guide for PickerOS. Expand any section to read details.
    </div>
    {sections.map(s=><div key={s.t} className="exp" style={{marginBottom:6}}>
      <div className="exp-h" onClick={()=>setOpen(o=>({...o,[s.t]:!o[s.t]}))}>
        <span className="exp-ht">
          <span style={{color:s.c}}>{s.ico}</span>
          <span style={{fontWeight:600}}>{s.t}</span>
        </span>
        <span style={{color:'var(--muted)',fontSize:'.7rem'}}>{open[s.t]?'▲':'▼'}</span>
      </div>
      {open[s.t]&&<div className="exp-b">
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          {s.items.map(([k,v])=><tr key={k} style={{borderBottom:'1px solid var(--border)'}}>
            <td style={{padding:'7px 12px 7px 0',fontWeight:700,fontSize:'.72rem',color:'var(--t2)',width:'28%',verticalAlign:'top'}}>{k}</td>
            <td style={{padding:'7px 0 7px 12px',fontSize:'.72rem',color:'var(--m2)',lineHeight:1.55,borderLeft:'1px solid var(--border)'}}>{v}</td>
          </tr>)}
        </table>
      </div>}
    </div>)}
  </div>;
}


// ── AnalyticsPickerSchedule ───────────────────────────────────────────────────
function AnalyticsPickerSchedule({token,cfg}){
  const[detail,setDetail]=useState(null);const[loading,setLoading]=useState(false);
  useEffect(()=>{if(!token)return;setLoading(true);
    apiFetch(`/api/plans/${token}`).then(d=>{setDetail(d);setLoading(false);}).catch(()=>setLoading(false));
  },[token]);
  const sched=useMemo(()=>{
    if(!detail?.details)return[];
    const m={};
    detail.details.forEach(d=>{
      const k=`${d.floor}-${d.picker_no}`;
      if(!m[k])m[k]={floor:d.floor,picker_no:d.picker_no,machine_no:d.machine_no,
        scanner:d.scanner_name,grp:d.grp,bgt:d.bgt_machine,dos:0,qty:0,
        start:d.start_time,end:d.end_time,util:0,prios:[],
        done:0,delayed:0,cancelled:0,planned:0};
      m[k].dos++;m[k].qty+=d.do_qty;
      if(d.start_time<m[k].start)m[k].start=d.start_time;
      if(d.end_time>m[k].end)m[k].end=d.end_time;
      if((d.util_pct||0)>m[k].util)m[k].util=d.util_pct||0;
      if(!m[k].prios.includes(d.priority))m[k].prios.push(d.priority);
      const st=d.status||'Planned';
      if(st==='Done')m[k].done++;else if(st==='Delayed')m[k].delayed++;
      else if(st==='Cancelled')m[k].cancelled++;else m[k].planned++;
    });
    return Object.values(m).sort((a,b)=>a.floor-b.floor||a.picker_no-b.picker_no);
  },[detail]);
  if(loading)return<div className="ctr" style={{padding:40}}><Spin/></div>;
  if(!detail)return<div className="al al-i">Loading picker schedule...</div>;
  const fp=cfg?.fill_pct||70;
  return<div>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,alignItems:'center'}}>
      <div style={{fontSize:'.7rem',fontWeight:600}}>Picker Schedule — {token} · {sched.length} pickers</div>
      <button className="btn btn-g btn-sm" onClick={()=>dlTableCSV(sched,'picker_schedule')}>⬇️ Download CSV</button>
    </div>
    <div className="tw xl"><table className="dt"><thead><tr>
      <th>Floor</th><th>Picker</th><th>Machine</th><th>Scanner</th><th>Grp</th><th>BGT</th>
      <th>DOs</th><th>QTY</th><th>Priorities</th><th>Start</th><th>End</th><th>Util%</th>
      <th>Done</th><th>Delayed</th><th>Cancelled</th><th>Pending</th>
    </tr></thead><tbody>
      {sched.map((r,i)=>{
        const col=r.util>=fp?'var(--green)':'var(--gold)';
        const gc={G1:'var(--green)',G2:'var(--accent)',G3:'var(--gold)'}[r.grp]||'var(--accent)';
        return<tr key={i}>
          <td><FL f={r.floor}/></td>
          <td className="n" style={{fontFamily:'var(--mono)',fontWeight:700,color:'var(--accent)'}}>
            <span style={{color:gc,fontWeight:700,fontSize:'.6rem'}}>{r.grp}·</span>P{String(r.picker_no).padStart(2,'0')}
          </td>
          <td style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:'.67rem'}}>{r.machine_no}</td>
          <td style={{fontSize:'.63rem',color:'var(--muted)'}}>{r.scanner||'—'}</td>
          <td><GPill g={r.grp}/></td>
          <td className="n" style={{fontSize:'.63rem'}}>{(r.bgt||0).toLocaleString()}</td>
          <td className="n">{r.dos}</td>
          <td className="n">{r.qty.toLocaleString()}</td>
          <td style={{fontSize:'.6rem',color:'var(--muted)',maxWidth:120,overflow:'hidden'}}>
            {r.prios.sort((a,b)=>a-b).map(p=>`P${p}`).join('→')}
          </td>
          <td style={{color:'var(--accent)',fontFamily:'var(--mono)',fontSize:'.67rem'}}>{r.start}</td>
          <td style={{fontFamily:'var(--mono)',fontSize:'.67rem'}}>{r.end}</td>
          <td>
            <div style={{display:'flex',alignItems:'center',gap:5}}>
              <div className="pb sl" style={{width:50}}>
                <div className="pbf" style={{width:`${r.util}%`,background:col}}/>
              </div>
              <span style={{fontSize:'.62rem',color:col,fontFamily:'var(--mono)',fontWeight:700}}>{r.util}%</span>
            </div>
          </td>
          <td className="n" style={{color:'var(--green)',fontWeight:700}}>{r.done}</td>
          <td className="n" style={{color:'var(--gold)'}}>{r.delayed}</td>
          <td className="n" style={{color:'var(--red)'}}>{r.cancelled}</td>
          <td className="n" style={{color:'var(--accent)'}}>{r.planned}</td>
        </tr>;})}
    </tbody></table></div>
  </div>;
}

// ── REPORTS PAGE ─────────────────────────────────────────────────────────────
function ReportsPage({toast}){
  const[plans,setPlans]=useState([]);const[selTokens,setSelTokens]=useState([]);
  const[dateFrom,setDateFrom]=useState('');const[dateTo,setDateTo]=useState('');
  const[mode,setMode]=useState('token'); // 'token' or 'date'
  const[statusF,setStatusF]=useState('All');const[floorF,setFloorF]=useState('');
  const[loading,setLoading]=useState(false);const[preview,setPreview]=useState(null);
  useEffect(()=>{apiFetch('/api/plans').then(setPlans).catch(()=>{});},[]);
  const toggleToken=(tok)=>setSelTokens(t=>t.includes(tok)?t.filter(x=>x!==tok):[...t,tok]);
  const selectAll=()=>setSelTokens(plans.map(p=>p.token));
  const clearAll=()=>setSelTokens([]);
  const buildUrl=(fmt='excel')=>{
    let url=`${API}/api/export/dos?`;
    const params=[];
    if(mode==='token')selTokens.forEach(t=>params.push(`token=${encodeURIComponent(t)}`));
    if(mode==='date'){if(dateFrom)params.push(`date_from=${dateFrom}`);if(dateTo)params.push(`date_to=${dateTo}`);}
    if(statusF!=='All')params.push(`status=${encodeURIComponent(statusF)}`);
    if(floorF)params.push(`floor=${floorF}`);
    return url+params.join('&');
  };
  const loadPreview=async()=>{
    setLoading(true);setPreview(null);
    try{
      let url='/api/analytics/summary?';
      if(mode==='date'){if(dateFrom)url+=`date_from=${dateFrom}&`;if(dateTo)url+=`date_to=${dateTo}&`;}
      const d=await apiFetch(url);setPreview(d);
    }catch(e){toast(e.message,'err');}finally{setLoading(false);}
  };
  const dateGroups=useMemo(()=>{
    const g={};plans.forEach(p=>{if(!g[p.plan_date])g[p.plan_date]=[];g[p.plan_date].push(p);});
    return Object.entries(g).sort(([a],[b])=>b.localeCompare(a));
  },[plans]);
  return<div>
    <div className="g2" style={{gap:16,marginBottom:16}}>
      <div>
        <div className="sec">Report Configuration</div>
        <div className="stabs" style={{marginBottom:12}}>
          <div className={`stab${mode==='token'?' on':''}`} onClick={()=>setMode('token')}>🏷️ By Token</div>
          <div className={`stab${mode==='date'?' on':''}`} onClick={()=>setMode('date')}>📅 By Date Range</div>
        </div>
        {mode==='token'&&<>
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            <button className="btn btn-g btn-sm" onClick={selectAll}>Select All</button>
            <button className="btn btn-g btn-sm" onClick={clearAll}>Clear</button>
            <span style={{fontSize:'.65rem',color:'var(--muted)',alignSelf:'center'}}>{selTokens.length} selected</span>
          </div>
          <div style={{maxHeight:340,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8}}>
            {dateGroups.map(([dt,dps])=><div key={dt}>
              <div style={{background:'var(--s1)',padding:'4px 10px',fontSize:'.58rem',color:'var(--muted)',fontFamily:'var(--mono)',fontWeight:700,sticky:'top'}}>{dt}</div>
              {dps.map(p=><div key={p.token} onClick={()=>toggleToken(p.token)}
                style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',cursor:'pointer',
                  background:selTokens.includes(p.token)?'rgba(59,130,246,.1)':'transparent',
                  borderBottom:'1px solid rgba(26,37,53,.5)'}}>
                <input type="checkbox" checked={selTokens.includes(p.token)} onChange={()=>{}} style={{width:'auto',pointerEvents:'none'}}/>
                <div>
                  <div style={{fontFamily:'var(--mono)',fontSize:'.72rem',fontWeight:700,color:selTokens.includes(p.token)?'var(--accent)':'var(--t2)'}}>{p.token}</div>
                  <div style={{fontSize:'.6rem',color:'var(--muted)'}}>{p.total_dos} DOs · R{p.run_number} · Util {p.avg_util}%</div>
                </div>
              </div>)}
            </div>)}
          </div>
        </>}
        {mode==='date'&&<div className="g2" style={{gap:9}}>
          <div className="fg"><label className="lbl">Date From</label>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/></div>
          <div className="fg"><label className="lbl">Date To</label>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/></div>
        </div>}
        <div className="g2" style={{gap:9,marginTop:10}}>
          <div className="fg"><label className="lbl">Status Filter</label>
            <select value={statusF} onChange={e=>setStatusF(e.target.value)}>
              <option>All</option>{['Planned','Done','Delayed','Not Picked','Cancelled'].map(s=><option key={s}>{s}</option>)}
            </select></div>
          <div className="fg"><label className="lbl">Floor Filter (blank = all)</label>
            <input type="number" placeholder="e.g. 1" value={floorF} onChange={e=>setFloorF(e.target.value)}/></div>
        </div>
      </div>

      <div>
        <div className="sec">Download</div>
        <div className="card" style={{padding:'16px'}}>
          <div style={{fontSize:'.72rem',color:'var(--muted)',marginBottom:14,lineHeight:1.6}}>
            Download all DO data across selected {mode==='token'?`${selTokens.length} plan(s)`:'date range'} in one Excel file.
            Includes all columns: Token, Plan Date, Floor, Priority, DO No, SEC, QTY, Picker, Machine, Scanner, Group,
            BGT, Start Time, End Time, Status, Cancel Reason, Actual Date, Actual Start, Actual End.
          </div>
          <a href={buildUrl('excel')} download style={{display:'block',marginBottom:8}}>
            <button className="btn btn-gr btn-fw btn-lg" disabled={mode==='token'&&!selTokens.length}>
              📥 Download DO Export Excel
            </button>
          </a>
          <button className="btn btn-g btn-fw" onClick={loadPreview} disabled={loading}>
            {loading?<><Spin sm/>&nbsp;Loading...</>:'👁️ Preview Summary'}
          </button>
        </div>

        {preview&&<>
          <div className="sec" style={{marginTop:13}}>Report Summary Preview</div>
          <div className="g3" style={{gap:8,marginBottom:10}}>
            {[{l:'Plans',v:preview.summary?.total_dos?preview.plans?.length:0,c:'bl'},
              {l:'Total DOs',v:preview.summary?.total_dos||0,c:'pu'},
              {l:'Completion',v:`${preview.summary?.completion_pct||0}%`,c:'gr'},
              {l:'QTY',v:(preview.summary?.total_qty||0).toLocaleString(),c:'cy'},
              {l:'Pickers',v:preview.summary?.pickers_used||0,c:'go'},
              {l:'Date Range',v:preview.summary?.dates?.length?`${preview.summary.dates[0]} → ${preview.summary.dates[preview.summary.dates.length-1]}`:'—',c:'pu'}]
              .map(k=><div key={k.l} className={`kpi ${k.c}`} style={{padding:'9px 11px'}}>
                <div className="kl">{k.l}</div><div className="kv" style={{fontSize:'.9rem'}}>{k.v}</div>
              </div>)}
          </div>
          {preview.summary?.status_counts&&<div className="card" style={{padding:'12px 14px',marginBottom:10}}>
            <div style={{fontSize:'.6rem',color:'var(--muted)',marginBottom:7,textTransform:'uppercase',letterSpacing:'.1em'}}>Status Distribution</div>
            <div className="sbar" style={{marginBottom:7}}>
              {Object.entries(preview.summary.status_counts).map(([s,c])=>{
                const pct=(c/Math.max(preview.summary.total_dos,1)*100).toFixed(1);
                return<div key={s} className="sbs" style={{width:`${pct}%`,background:STCL[s]||'#666'}} title={`${s}: ${c}`}/>;
              })}
            </div>
            <div style={{display:'flex',gap:9,flexWrap:'wrap'}}>
              {Object.entries(preview.summary.status_counts).map(([s,c])=><span key={s} style={{fontSize:'.63rem',display:'flex',alignItems:'center',gap:3}}>
                <span style={{width:8,height:8,borderRadius:2,background:STCL[s]||'#666',display:'inline-block'}}/>{s}: <b>{c}</b>
              </span>)}
            </div>
          </div>}
          {preview.plans?.length>0&&<div className="tw md">
            <table className="dt"><thead><tr><th>Token</th><th>Date</th><th>Run</th><th>DOs</th><th>Util%</th></tr></thead>
            <tbody>{preview.plans.map((p,i)=><tr key={i}>
              <td style={{fontFamily:'var(--mono)',fontSize:'.67rem',color:'var(--accent)',fontWeight:700}}>{p.token}</td>
              <td>{p.plan_date}</td><td className="n">R{p.run_number}</td>
              <td className="n">{p.total_dos}</td>
              <td><div className="pb sl" style={{width:50}}>
                <div className="pbf" style={{width:`${p.avg_util||0}%`,background:'var(--green)'}}/>
              </div></td>
            </tr>)}</tbody></table>
          </div>}
        </>}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
