<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PickerOS — Warehouse Planning</title>
<script src="/static/vendor/react.production.min.js"></script>
<script src="/static/vendor/react-dom.production.min.js"></script>
<script src="/static/vendor/babel.min.js"></script>
<link href="/static/vendor/fonts_local.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090E;--s1:#0C1018;--s2:#101520;--card:#131A24;--card2:#162030;
  --border:#1A2535;--b2:#1E2D40;--b3:#243347;
  --accent:#3B82F6;--a2:#6366F1;--a3:#8B5CF6;
  --green:#10B981;--g2:#059669;--gold:#F59E0B;--go2:#D97706;
  --red:#EF4444;--r2:#DC2626;--cyan:#06B6D4;--pink:#EC4899;
  --text:#E2E8F0;--t2:#CBD5E1;--muted:#64748B;--m2:#94A3B8;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --sb:240px;--hh:50px;
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px}
.layout{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sb{width:var(--sb);background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .22s cubic-bezier(.4,0,.2,1)}
.sb.collapsed{width:54px}
.sb-logo{padding:12px 12px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;overflow:hidden;min-height:52px}
.sb-logo-txt{min-width:0;flex:1;overflow:hidden}
.sb-title{font-family:var(--mono);font-size:.9rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.sb-sub{font-size:.58rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.sb-toggle{flex-shrink:0;background:transparent;border:1px solid var(--b2);border-radius:5px;color:var(--muted);cursor:pointer;font-size:.7rem;padding:4px 6px;transition:all .15s;line-height:1}
.sb-toggle:hover{border-color:var(--accent);color:var(--accent)}
.sb-sec{padding:10px 10px 3px;font-size:.52rem;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;transition:opacity .15s}
.sb.collapsed .sb-sec{opacity:0;height:0;padding:0;margin:0}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;border-radius:6px;margin:1px 5px;transition:all .15s;font-size:.78rem;font-weight:500;color:var(--m2);white-space:nowrap;overflow:hidden;position:relative}
.sb-item:hover{background:var(--card2);color:var(--text)}
.sb-item.on{background:rgba(59,130,246,.12);color:var(--accent);font-weight:600}
.sb-ico{font-size:.9rem;width:18px;text-align:center;flex-shrink:0}
.sb-lbl{transition:opacity .15s,width .15s;overflow:hidden}
.sb.collapsed .sb-lbl{opacity:0;width:0}
.sb-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:.52rem;padding:1px 5px;border-radius:8px;font-family:var(--mono);font-weight:700;transition:opacity .15s}
.sb.collapsed .sb-badge{opacity:0;width:0;padding:0;margin:0}
.sb-badge.r{background:var(--red)}.sb-badge.g{background:var(--green)}.sb-badge.o{background:var(--gold);color:#000}
/* Tooltip on collapsed sidebar items */
.sb.collapsed .sb-item::after{content:attr(data-tip);position:absolute;left:54px;background:var(--card2);border:1px solid var(--b2);color:var(--text);font-size:.72rem;padding:4px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;z-index:999;transition:opacity .15s}
.sb.collapsed .sb-item:hover::after{opacity:1}
.sb-foot{margin-top:auto;padding:10px 13px;border-top:1px solid var(--border);font-size:.6rem;color:var(--muted);overflow:hidden}
.sb.collapsed .sb-foot-txt{display:none}
.sb-div{border:none;border-top:1px solid var(--border);margin:5px 8px}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--hh);background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.tb-title{font-family:var(--mono);font-size:.85rem;font-weight:700}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-tag{background:var(--card2);border:1px solid var(--b2);border-radius:4px;padding:3px 8px;font-size:.6rem;font-family:var(--mono);color:var(--muted)}
.content{flex:1;overflow-y:auto;padding:18px 20px}
/* SECTION */
.sec{font-family:var(--mono);font-size:.57rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:6px;margin:14px 0 10px 0}
.sec:first-child{margin-top:0}
/* KPI CARDS */
.kpi{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:11px 13px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.bl::before{background:linear-gradient(90deg,#3B82F6,#6366F1)}.kpi.gr::before{background:var(--green)}
.kpi.go::before{background:var(--gold)}.kpi.re::before{background:var(--red)}
.kpi.cy::before{background:var(--cyan)}.kpi.pu::before{background:var(--a3)}.kpi.pi::before{background:var(--pink)}
.kl{font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;font-weight:600}
.kv{font-family:var(--mono);font-size:1.35rem;font-weight:700;line-height:1}
.ks{font-size:.58rem;color:var(--muted);margin-top:3px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:14px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:11px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff}
.btn-p:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-g{background:transparent;border:1px solid var(--b2);color:var(--m2)}
.btn-g:hover{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.06)}
.btn-gr{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.btn-gr:hover{background:rgba(16,185,129,.18)}
.btn-d{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.btn-d:hover{background:rgba(239,68,68,.18)}
.btn-sm{padding:5px 10px;font-size:.7rem}
.btn-xs{padding:3px 8px;font-size:.62rem;border-radius:5px}
.btn-lg{padding:11px 22px;font-size:.85rem}
.btn-fw{width:100%;justify-content:center}
/* ALERTS */
.al{border-radius:8px;padding:9px 13px;margin:7px 0;font-size:.77rem;line-height:1.55}
.al b{font-weight:700}
.al-i{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.22);border-left:3px solid var(--accent)}
.al-o{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.22);border-left:3px solid var(--green)}
.al-w{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);border-left:3px solid var(--gold)}
.al-e{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.22);border-left:3px solid var(--red)}
/* FORM */
.fg{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:.65rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
input,select,textarea{background:var(--s2);border:1px solid var(--b2);border-radius:6px;color:var(--text);padding:7px 9px;font-size:.78rem;font-family:var(--sans);outline:none;transition:border .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--card)}
input[type=range]{accent-color:var(--accent);padding:4px 0}
input[type=date],input[type=time]{color-scheme:dark}
input[type=checkbox]{width:auto;accent-color:var(--accent)}
/* TABLE */
.tw{overflow:auto;border-radius:8px;border:1px solid var(--border)}
.tw.sh{max-height:300px}.tw.md{max-height:420px}.tw.tl{max-height:520px}.tw.xl{max-height:660px}
table.dt{width:100%;border-collapse:collapse;font-size:.71rem}
table.dt th{background:var(--s1);color:var(--muted);font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;padding:8px 9px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;font-weight:700;position:sticky;top:0;z-index:1}
table.dt td{padding:6px 9px;border-bottom:1px solid rgba(26,37,53,.7);font-family:var(--mono);font-size:.67rem;vertical-align:middle}
table.dt tr:hover td{background:rgba(59,130,246,.03)}
table.dt .n{text-align:right}
/* PILLS */
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.56rem;font-weight:700;font-family:var(--mono);white-space:nowrap}
.pD{background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.3)}
.pP{background:rgba(59,130,246,.15);color:#3B82F6;border:1px solid rgba(59,130,246,.3)}
.pDl{background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.3)}
.pC{background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.3)}
.pN{background:rgba(100,116,139,.15);color:#94A3B8;border:1px solid rgba(100,116,139,.3)}
.pG1{background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.25)}
.pG2{background:rgba(59,130,246,.15);color:#3B82F6;border:1px solid rgba(59,130,246,.25)}
.pG3{background:rgba(245,158,11,.15);color:#F59E0B;border:1px solid rgba(245,158,11,.25)}
/* TOKEN */
.tok-box{background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(99,102,241,.1));border:1.5px solid rgba(59,130,246,.4);border-radius:11px;padding:14px 18px;text-align:center}
.tok-v{font-family:var(--mono);font-size:1.7rem;font-weight:700;color:var(--accent);letter-spacing:.04em}
.tok-m{font-size:.63rem;color:var(--muted);margin-top:4px}
/* PBAR */
.pb{height:7px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.pb.sl{height:4px}.pb.th{height:12px}
.pbf{height:100%;border-radius:4px;transition:width .4s}
/* GANTT */
.gt-wrap{overflow-x:auto;padding-bottom:4px}
.gt-row{display:flex;align-items:center;gap:5px;padding:2px 0;border-bottom:1px solid rgba(26,37,53,.4);min-width:580px}
.gt-lbl{font-family:var(--mono);font-size:.58rem;color:var(--muted);width:95px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:4px}
.gt-track{flex:1;height:19px;background:var(--s2);border-radius:3px;position:relative}
.gt-end{width:42px;flex-shrink:0;font-size:.55rem;color:var(--muted);font-family:var(--mono);text-align:right}
/* FLOOR TABLE */
.ft{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.ft-hd{display:grid;padding:7px 12px;background:var(--s1);border-bottom:1px solid var(--border);font-size:.54rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;align-items:center}
.ft-row{display:grid;padding:7px 12px;border-bottom:1px solid rgba(26,37,53,.5);align-items:center}
.ft-row:last-child{border-bottom:none}
.ft-row:hover{background:rgba(59,130,246,.03)}
.ft-8{grid-template-columns:46px 80px 68px 85px 85px 1fr 130px 90px;gap:6px}
/* EXPANDER */
.exp{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin:7px 0}
.exp-h{background:var(--s2);padding:9px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;transition:background .15s}
.exp-h:hover{background:rgba(59,130,246,.06)}
.exp-ht{font-size:.78rem;font-weight:500;display:flex;align-items:center;gap:7px}
.exp-b{padding:13px;border-top:1px solid var(--border);background:var(--card)}
/* DROP */
.drop{border:2px dashed var(--b2);border-radius:9px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--s2)}
.drop:hover,.drop.dg{border-color:var(--accent);background:rgba(59,130,246,.05)}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.g23{display:grid;grid-template-columns:2fr 3fr;gap:14px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:14px}
/* SUBTABS */
.stabs{display:flex;gap:2px;background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:3px;width:fit-content;margin-bottom:11px}
.stab{padding:5px 13px;font-size:.73rem;font-weight:500;color:var(--muted);cursor:pointer;border-radius:5px;transition:all .15s;white-space:nowrap}
.stab:hover{color:var(--t2)}.stab.on{background:var(--card2);color:var(--accent);font-weight:600}
/* TOASTS */
.toasts{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:.76rem;display:flex;align-items:center;gap:7px;min-width:240px;max-width:360px;box-shadow:0 8px 28px rgba(0,0,0,.55);animation:sI .2s ease}
.toast.ok{border-left:3px solid var(--green)}.toast.err{border-left:3px solid var(--red)}
.toast.info{border-left:3px solid var(--accent)}.toast.warn{border-left:3px solid var(--gold)}
@keyframes sI{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
/* MODAL */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.mo{background:var(--card);border:1px solid var(--b2);border-radius:11px;padding:22px;width:460px;max-width:92vw;box-shadow:0 20px 55px rgba(0,0,0,.7)}
.mo-t{font-family:var(--mono);font-size:.92rem;font-weight:700;margin-bottom:9px}
.mo-b{font-size:.78rem;color:var(--m2);line-height:1.6;margin-bottom:18px}
.mo-f{display:flex;gap:9px;justify-content:flex-end}
/* MISC */
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.hint{font-size:.63rem;color:var(--muted);margin-top:3px;line-height:1.4}
.mono{font-family:var(--mono)}
.spin{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite}
.spin-sm{width:14px;height:14px;border-width:2px}
@keyframes rot{to{transform:rotate(360deg)}}
.ctr{display:flex;align-items:center;justify-content:center}
.fl{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;background:var(--s1);font-family:var(--mono);font-size:.6rem;font-weight:700;border:1px solid var(--b2)}
.sbar{display:flex;height:9px;border-radius:5px;overflow:hidden;gap:1px}
.sbs{height:100%;transition:width .4s;min-width:2px}
.bc-row{display:flex;align-items:center;gap:7px;padding:3px 0}
.bc-lbl{font-size:.63rem;color:var(--muted);width:70px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.bc-bar{flex:1;height:17px;background:var(--s1);border-radius:3px;position:relative;overflow:hidden}
.bc-fill{height:100%;border-radius:3px}.bc-val{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:.56rem;font-weight:700;font-family:var(--mono);color:rgba(255,255,255,.85)}
.pager{display:flex;align-items:center;gap:4px;padding:9px 0;justify-content:center}
.pg{padding:3px 9px;border-radius:5px;font-size:.68rem;cursor:pointer;background:var(--s2);border:1px solid var(--b2);color:var(--muted)}
.pg:hover,.pg.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sbox{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:9px}
.sbox-t{font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--cyan);margin-bottom:11px;font-weight:700}
.fbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:11px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo}=React;
const API=window.location.origin;

// ── CSV download helper ──────────────────────────────────────────────────────
function dlTableCSV(rows, fname='export'){
  if(!rows||!rows.length)return;
  const keys=Object.keys(rows[0]);
  const lines=[keys.join(','),...rows.map(r=>keys.map(k=>{const v=r[k];return typeof v==='string'&&v.includes(',')?`"${v}"`:v??'';}).join(','))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${fname}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

// ── Table-to-Excel helper (tab-separated, opens in Excel) ────────────────────
function dlTableTSV(tableId, fname='export'){
  const t=document.getElementById(tableId);
  if(!t)return;
  const rows=[...t.querySelectorAll('tr')].map(r=>[...r.querySelectorAll('th,td')].map(c=>c.innerText).join('\t'));
  const blob=new Blob([rows.join('\n')],{type:'text/tab-separated-values'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${fname}_${new Date().toISOString().slice(0,10)}.tsv`;a.click();
}

async function apiFetch(path,opts={}){
  // Auto-inject auth token if present
  try{
    const auth=JSON.parse(localStorage.getItem('picker_auth')||'null');
    if(auth?.token&&!opts.headers?.Authorization){
      opts.headers={...(opts.headers||{}),'Authorization':`Bearer ${auth.token}`};
    }
  }catch{}
  const r=await fetch(API+path,opts);
  if(!r.ok){const e=await r.json().catch(()=>({detail:'Error'}));throw new Error(e.detail||`HTTP ${r.status}`);}
  return r.json();
}
function useToast(){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='info')=>{
    const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4500);
  },[]);
  return{toasts,toast:add};
}
function Toasts({toasts}){
  const ico={ok:'✓',err:'✗',warn:'⚠',info:'ℹ'};
  return<div className="toasts">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}><span style={{flexShrink:0}}>{ico[t.type]}</span><span>{t.msg}</span></div>)}</div>;
}
function Confirm({title,body,onOk,onCancel}){
  return<div className="mb"><div className="mo"><div className="mo-t">{title}</div><div className="mo-b">{body}</div><div className="mo-f"><button className="btn btn-g btn-sm" onClick={onCancel}>Cancel</button><button className="btn btn-d btn-sm" onClick={onOk}>Confirm</button></div></div></div>;
}
const STC={Done:'pD',Planned:'pP',Delayed:'pDl','Not Picked':'pN',Cancelled:'pC'};
const STCL={Done:'var(--green)',Planned:'var(--accent)',Delayed:'var(--gold)','Not Picked':'var(--muted)',Cancelled:'var(--red)'};
const PCOL=['#EF4444','#F97316','#EAB308','#22C55E','#06B6D4','#3B82F6','#8B5CF6','#EC4899','#14B8A6','#F59E0B','#6366F1','#10B981','#F43F5E','#A855F7'];
function SPill({s}){return<span className={`pill ${STC[s]||'pP'}`}>{s}</span>;}
function GPill({g}){const cl={G1:'pG1',G2:'pG2',G3:'pG3'};return<span className={`pill ${cl[g]||'pG1'}`}>{g||'G1'}</span>;}
function FL({f}){return<span className="fl">{f}</span>;}
function Spin({sm}){return<div className={`spin${sm?' spin-sm':''}`}/>;}
function usePager(items,sz=60){
  const[page,setPage]=useState(1);
  const total=Math.max(1,Math.ceil(items.length/sz));
  useEffect(()=>setPage(1),[items.length]);
  return{page,setPage,total,slice:items.slice((page-1)*sz,page*sz)};
}
function Pager({page,total,setPage,count}){
  if(total<=1)return null;
  return<div className="pager">
    <button className="pg" onClick={()=>setPage(1)} disabled={page===1}>«</button>
    <button className="pg" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>‹</button>
    <span style={{fontSize:'.68rem',color:'var(--muted)',padding:'0 8px'}}>{page}/{total} · {count}</span>
    <button className="pg" onClick={()=>setPage(p=>Math.min(total,p+1))} disabled={page===total}>›</button>
    <button className="pg" onClick={()=>setPage(total)} disabled={page===total}>»</button>
  </div>;
}
function PBar({v,max=100,color,h=7,thr}){
  const pct=Math.min(100,(v/Math.max(1,max))*100);
  const col=color||(v>=70?'var(--green)':v>=50?'var(--gold)':'var(--red)');
  return<div className="pb" style={{height:h}}>
    {thr&&<div style={{position:'absolute',left:`${thr}%`,top:0,bottom:0,width:2,background:'rgba(255,255,255,.3)',zIndex:2}}/>}
    <div className="pbf" style={{width:`${pct}%`,background:col}}/>
    <span style={{position:'absolute',right:4,top:'50%',transform:'translateY(-50%)',fontSize:'.5rem',fontWeight:700,color:'rgba(255,255,255,.8)',fontFamily:'var(--mono)'}}>{Math.round(pct)}%</span>
  </div>;
}

// ── GANTT ─────────────────────────────────────────────────────────────────
function GanttView({details,wsMin,weMin,fill}){
  const[fl,setFl]=useState(null);
  const viewMode='picker'; // Always picker view — machine+group shown in label
  const tm=s=>{try{const[h,m]=String(s).split(':');return+h*60+ +m}catch{return null}};
  const m2t=m=>`${String(m/60|0).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
  const floors=[...new Set(details.map(d=>d.floor))].sort();
  useEffect(()=>{if(floors.length&&fl===null)setFl(floors[0]);},[floors.join(',')]);

  const flDat=useMemo(()=>{
    if(fl===null)return{};
    const fd={};
    details.filter(d=>d.floor===fl).forEach(d=>{
      const key=String(d.picker_no||1);
      if(!fd[key])fd[key]={dos:[],grp:d.grp||'G1',util:0,end:'',bgt:d.bgt_machine||3000,machine_no:d.machine_no||'',scanner:d.scanner_name||''};
      fd[key].dos.push(d);
      if((d.util_pct||0)>fd[key].util)fd[key].util=d.util_pct||0;
      if(!fd[key].end||d.end_time>fd[key].end)fd[key].end=d.end_time;
    });
    return fd;
  },[details,fl,viewMode]);

  const allEnd=useMemo(()=>details.filter(d=>d.floor===fl).reduce((mx,d)=>Math.max(mx,tm(d.end_time)||0),0),[details,fl]);
  const SPAN=Math.max(weMin,allEnd+30)-wsMin;
  const pct=v=>((v-wsMin)/SPAN*100).toFixed(2)+'%';
  const ticks=[];for(let t=wsMin;t<=Math.max(weMin,allEnd+60);t+=60)ticks.push(t);

  // Machine utilisation summary for this floor
  const machSummary=useMemo(()=>{
    const entries=Object.entries(flDat);
    const idle=entries.filter(([,v])=>v.util<30).length;
    const busy=entries.filter(([,v])=>v.util>=fill).length;
    const avgUtil=entries.length?Math.round(entries.reduce((s,[,v])=>s+v.util,0)/entries.length):0;
    return{total:entries.length,idle,busy,avgUtil};
  },[flDat,fill]);

  return<div>
    {/* Floor + view mode selector */}
    <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
      <div style={{display:'flex',gap:4}}>
        {floors.map(f=><button key={f} className={`btn btn-xs ${fl===f?'btn-p':'btn-g'}`} onClick={()=>setFl(f)}>Floor {f}</button>)}
      </div>
      <span style={{fontSize:'.65rem',color:'var(--muted)',marginLeft:'auto'}}>👷 Picker View · Sorted by floor → picker number</span>
    </div>

    {/* Summary bar */}
    {fl!==null&&Object.keys(flDat).length>0&&<div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}}>
      {[{l:'Machines',v:machSummary.total,c:'var(--accent)'},{l:'At Target',v:machSummary.busy,c:'var(--green)'},
        {l:'Idle (<30%)',v:machSummary.idle,c:'var(--red)'},{l:'Avg Util',v:`${machSummary.avgUtil}%`,c:'var(--gold)'}]
        .map(x=><div key={x.l} style={{background:'var(--card2)',border:'1px solid var(--border)',borderRadius:6,padding:'5px 10px'}}>
          <div style={{fontSize:'.52rem',color:'var(--muted)',textTransform:'uppercase'}}>{x.l}</div>
          <div style={{fontFamily:'var(--mono)',fontWeight:700,color:x.c,fontSize:'.9rem'}}>{x.v}</div>
        </div>)}
    </div>}

    {fl!==null&&<div className="card" style={{padding:'12px 14px'}}>
      {/* Legend */}
      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8,paddingLeft:97}}>
        {[...new Set(Object.values(flDat).flatMap(p=>p.dos.map(d=>d.priority)))].sort((a,b)=>a-b).map(p=>
          <span key={p} style={{background:PCOL[(p-1)%PCOL.length],color:'#fff',fontSize:'.49rem',fontWeight:700,padding:'1px 5px',borderRadius:6}}>P{p}</span>)}
        <span style={{fontSize:'.49rem',color:'var(--muted)',marginLeft:6,alignSelf:'center'}}>Red line = {m2t(weMin)} · Dashed = Over WH</span>
      </div>
      {/* Time axis */}
      <div style={{position:'relative',height:14,paddingLeft:97,marginBottom:4}}>
        {ticks.map(t=><div key={t} style={{position:'absolute',left:`calc(${97}px + ${pct(t)})`,fontSize:'.47rem',color:'var(--muted)',fontFamily:'var(--mono)',transform:'translateX(-50%)'}}>{m2t(t)}</div>)}
      </div>
      <div style={{maxHeight:460,overflowY:'auto'}}>
        {Object.entries(flDat).sort((a,b)=>{
          // For machine view sort by util% ascending so idle machines show first (easy to spot)
          return +a[0]-+b[0]; // sort by picker number
        }).map(([key,pkd])=>{
          const uc=pkd.util>=fill?'var(--green)':pkd.util>=50?'var(--gold)':'var(--red)';
          const gc={G1:'var(--green)',G2:'var(--accent)',G3:'var(--gold)'}[pkd.grp]||'var(--accent)';
          const lblWidth=97;
          return<div key={key} className="gt-row">
            <div className="gt-lbl" style={{width:lblWidth}}>
              <>
                <div style={{display:'flex',alignItems:'center',gap:3,justifyContent:'flex-end'}}>
                  <span style={{color:gc,fontFamily:'var(--mono)',fontSize:'.56rem',fontWeight:700}}>{pkd.grp}</span>
                  <span style={{color:'var(--t2)',fontFamily:'var(--mono)',fontSize:'.6rem',fontWeight:700}}>·P{String(key).padStart(2,'0')}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:2,justifyContent:'flex-end',marginTop:1}}>
                  <span style={{fontSize:'.5rem',color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:85,textAlign:'right'}}>{pkd.machine_no||''}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:2,justifyContent:'flex-end',marginTop:1}}>
                  <div style={{height:3,background:'var(--border)',borderRadius:2,overflow:'hidden',width:60}}>
                    <div style={{height:'100%',width:`${pkd.util}%`,background:uc,borderRadius:2}}/>
                  </div>
                  <span style={{fontSize:'.5rem',color:uc,fontFamily:'var(--mono)',fontWeight:700}}>{Math.round(pkd.util)}%</span>
                </div>
              </>
            </div>
            <div className="gt-track">
              {/* Lunch shade */}
              <div style={{position:'absolute',left:pct(Math.max(wsMin,780)),width:`${(Math.min(825,Math.max(weMin,allEnd+30))-Math.max(wsMin,780))/SPAN*100}%`,height:'100%',background:'rgba(239,68,68,.06)'}}/>
              {/* WH close line */}
              <div style={{position:'absolute',left:pct(weMin),top:-2,bottom:-2,width:2,background:'rgba(239,68,68,.5)',zIndex:4}}/>
              {pkd.dos.map((d,i)=>{
                const ts=tm(d.start_time),te=tm(d.end_time);if(!ts||!te)return null;
                const l=Math.max(0,(ts-wsMin)/SPAN*100),w=Math.min(100-l,(te-ts)/SPAN*100);
                const col=PCOL[(+d.priority-1)%PCOL.length];
                const tip=`DO: ${d.do_no}
Machine: ${d.machine_no}
${d.start_time}–${d.end_time}
${d.do_qty.toLocaleString()} pcs · P${d.priority} · ${d.sec}
Util: ${d.util_pct}%`;
                return<div key={i} title={tip}
                  style={{position:'absolute',left:`${l}%`,width:`${Math.max(w,.3)}%`,height:'100%',background:col,
                    opacity:d.over_wh?.65:1,borderRadius:2,
                    border:d.over_wh?'1px dashed rgba(239,68,68,.85)':'none',cursor:'default'}}>
                  {w>4&&<span style={{fontSize:'.44rem',fontWeight:700,color:'rgba(255,255,255,.9)',padding:'0 2px',overflow:'hidden',whiteSpace:'nowrap',display:'block',lineHeight:'18px'}}>{d.do_qty}</span>}
                </div>;
              })}
            </div>
            <div className="gt-end" style={{width:50,fontSize:'.53rem'}}>{pkd.end}</div>
          </div>;
        })}
      </div>
    </div>}
  </div>;
}

// ── DEMAND TABLE ─────────────────────────────────────────────────────────────
function DemandTable({dos,cfg}){
  if(!dos?.length)return null;
  const fill=cfg.fill_pct,bgt=cfg.bgt;
  const floors=[...new Set(dos.map(d=>d.FLOOR||d.floor))].sort();
  const rows=floors.map(f=>{
    const fd=dos.filter(d=>(d.FLOOR||d.floor)===f);
    const qty=fd.reduce((s,d)=>s+(+d.DO_QTY||0),0),dos_=fd.length;
    const req=Math.max(1,Math.ceil(qty/(bgt*fill/100)));
    const exp=Math.round(qty/(req*bgt)*100);
    const prios={};fd.forEach(d=>{const p=d.PRIORITY||d.priority||1;if(!prios[p])prios[p]=0;prios[p]++;});
    return{f,qty,dos:dos_,req,exp,prios};
  });
  const tQ=rows.reduce((s,r)=>s+r.qty,0),tD=rows.reduce((s,r)=>s+r.dos,0),tR=rows.reduce((s,r)=>s+r.req,0);
  return<div>
    <div className="g4" style={{gap:8,marginBottom:11}}>
      {[{l:'Total QTY',v:tQ.toLocaleString(),c:'bl'},{l:'Total DOs',v:tD,c:'gr'},{l:'Req Pickers',v:tR,c:'pu'},{l:'Fill Target',v:`${fill}%`,c:'go'}]
        .map(k=><div key={k.l} className={`kpi ${k.c}`} style={{padding:'9px 11px'}}><div className="kl">{k.l}</div><div className="kv" style={{fontSize:'1.05rem'}}>{k.v}</div></div>)}
    </div>
    <div className="ft">
      <div className="ft-hd ft-8" style={{fontSize:'.53rem'}}><span>Floor</span><span>QTY</span><span>DOs</span><span>Req Pckrs</span><span>Fill Min</span><span>Utilisation</span><span>Util Bar</span><span>Priority Split</span></div>
      {rows.map(r=>{
        const uc=r.exp>=fill?'var(--green)':r.exp>=50?'var(--gold)':'var(--red)';
        const fillMin=Math.round(bgt*fill/100);
        return<div key={r.f} className="ft-row ft-8" style={{fontSize:'.7rem'}}>
          <span><FL f={r.f}/></span>
          <span style={{fontFamily:'var(--mono)',fontWeight:700,color:'var(--t2)'}}>{r.qty.toLocaleString()}</span>
          <span style={{fontFamily:'var(--mono)'}}>{r.dos}</span>
          <span style={{fontFamily:'var(--mono)',color:'var(--a3)',fontWeight:700}}>{r.req}</span>
          <span style={{fontFamily:'var(--mono)',color:'var(--muted)',fontSize:'.62rem'}}>{fillMin.toLocaleString()}</span>
          <span style={{fontFamily:'var(--mono)',color:uc,fontWeight:700}}>{r.exp}%</span>
          <span><div className="pb th" style={{minWidth:80}}>
            <div className="pbf" style={{width:`${Math.min(r.exp,100)}%`,background:uc}}/>
            <div style={{position:'absolute',left:`${fill}%`,top:0,bottom:0,width:2,background:'rgba(255,255,255,.35)'}}/>
          </div></span>
          <span style={{display:'flex',flexWrap:'wrap',gap:3}}>
            {Object.entries(r.prios).sort((a,b)=>+a[0]-+b[0]).map(([p,c])=>
              <span key={p} style={{fontSize:'.56rem',fontWeight:700,color:PCOL[(+p-1)%PCOL.length]}}>{`P${p}:${c}`}</span>)}
          </span>
        </div>;
      })}
    </div>
  </div>;
}

// ── MACHINE GROUP CARDS ───────────────────────────────────────────────────────
function MachineGroups({grp_summary,cfg}){return null;} // replaced by MachineAvailability

function MachineAvailability({grp_summary,floor_avail,floor_required,summary,cfg}){
  if(!grp_summary||!Object.keys(grp_summary).length)return null;
  const total=summary?.total_machines||Object.values(grp_summary).reduce((s,v)=>s+(v.machines||0),0);
  const g1=grp_summary.G1||{machines:0};const g2=grp_summary.G2||{machines:0};const g3=grp_summary.G3||{machines:0};
  const totalReq=Object.values(floor_required||{}).reduce((s,v)=>s+(v.required||0),0);
  const surplus=total-totalReq;
  const gCols={G1:'var(--green)',G2:'var(--accent)',G3:'var(--gold)'};
  const floors=Object.keys(floor_required||{}).map(Number).sort();
  return<div style={{marginBottom:13}}>
    {/* Top summary row */}
    <div className="g5" style={{gap:8,marginBottom:10}}>
      {[
        {l:'Total Machines',v:total,c:'bl',s:`${summary?.avg_bgt?.toLocaleString()||'?'} avg BGT`},
        {l:'G1 Machines',v:g1.machines,c:'gr',s:`BGT ≥ 3,000 · avg ${g1.avg_bgt?.toLocaleString()||'?'}`},
        {l:'G2 Machines',v:g2.machines,c:'cy',s:`BGT ≥ 2,000 · avg ${g2.avg_bgt?.toLocaleString()||'?'}`},
        {l:'G3 Machines',v:g3.machines,c:'go',s:`BGT ≥ 1,000 · avg ${g3.avg_bgt?.toLocaleString()||'?'}`},
        {l:surplus>=0?'Pool Surplus':'Pool Deficit',v:surplus>=0?`+${surplus}`:`${surplus}`,c:surplus>=0?'gr':'re',s:`${totalReq} required for ${cfg.fill_pct}% fill`},
      ].map(k=><div key={k.l} className={`kpi ${k.c}`} style={{padding:'9px 12px'}}>
        <div className="kl">{k.l}</div>
        <div className="kv" style={{fontSize:'1.2rem',color:k.c==='re'?'var(--red)':k.c==='gr'?'var(--green)':undefined}}>{k.v}</div>
        <div className="ks">{k.s}</div>
      </div>)}
    </div>

    {/* Per-floor availability vs required */}
    {floors.length>0&&<div className="card" style={{padding:'12px 14px'}}>
      <div style={{fontSize:'.6rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:9,fontWeight:700}}>Machine Availability vs Demand — Per Floor <span style={{color:'var(--accent)',textTransform:'none',letterSpacing:'normal',fontWeight:400}}>· at {cfg.fill_pct}% fill target · BGT {cfg.bgt.toLocaleString()}</span></div>
      <div style={{display:'grid',gridTemplateColumns:'50px 1fr 80px 80px 90px 130px',gap:6,marginBottom:5,fontSize:'.53rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',fontWeight:700}}>
        <span>Floor</span><span>Load Bar</span><span className="n" style={{textAlign:'right'}}>Required</span><span className="n" style={{textAlign:'right'}}>Available</span><span className="n" style={{textAlign:'right'}}>Surplus</span><span>G1/G2/G3 Mix</span>
      </div>
      {floors.map(f=>{
        const fr=floor_required[f]||{required:0,available:0,surplus:0};
        const fa=floor_avail?.[f]||{};
        const pct=Math.min(100,Math.round(fr.required/Math.max(1,fr.available)*100));
        const col=pct<=70?'var(--green)':pct<=100?'var(--gold)':'var(--red)';
        return<div key={f} style={{display:'grid',gridTemplateColumns:'50px 1fr 80px 80px 90px 130px',gap:6,alignItems:'center',padding:'5px 0',borderBottom:'1px solid rgba(26,37,53,.6)'}}>
          <span><FL f={f}/></span>
          <div>
            <div className="pb" style={{height:12}}>
              <div className="pbf" style={{width:`${pct}%`,background:col}}/>
              <span style={{position:'absolute',left:6,top:'50%',transform:'translateY(-50%)',fontSize:'.52rem',color:'rgba(255,255,255,.8)',fontFamily:'var(--mono)',fontWeight:700}}>{pct}% loaded</span>
            </div>
          </div>
          <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:'.7rem',color:'var(--a3)',fontWeight:700}}>{fr.required}</span>
          <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:'.7rem',color:'var(--t2)'}}>{fr.available}</span>
          <span style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:'.7rem',fontWeight:700,color:fr.surplus>=0?'var(--green)':'var(--red)'}}>{fr.surplus>=0?`+${fr.surplus}`:fr.surplus}</span>
          <span style={{display:'flex',gap:4}}>
            {fa.G1>0&&<span style={{background:'rgba(16,185,129,.15)',color:'var(--green)',border:'1px solid rgba(16,185,129,.3)',borderRadius:4,padding:'1px 5px',fontSize:'.57rem',fontFamily:'var(--mono)',fontWeight:700}}>G1:{fa.G1}</span>}
            {fa.G2>0&&<span style={{background:'rgba(59,130,246,.15)',color:'var(--accent)',border:'1px solid rgba(59,130,246,.3)',borderRadius:4,padding:'1px 5px',fontSize:'.57rem',fontFamily:'var(--mono)',fontWeight:700}}>G2:{fa.G2}</span>}
            {fa.G3>0&&<span style={{background:'rgba(245,158,11,.15)',color:'var(--gold)',border:'1px solid rgba(245,158,11,.3)',borderRadius:4,padding:'1px 5px',fontSize:'.57rem',fontFamily:'var(--mono)',fontWeight:700}}>G3:{fa.G3}</span>}
            {!fa.G1&&!fa.G2&&!fa.G3&&<span style={{fontSize:'.6rem',color:'var(--muted)'}}>pool shared</span>}
          </span>
        </div>;
      })}
    </div>}
  </div>;
}

      <div className="g3" style={{gap:10,marginBottom:10}}>
        {[{g:'G1',c:'var(--green)',k1:'g1_min',desc:'G1 minimum BGT_PICKER'},
          {g:'G2',c:'var(--accent)',k1:'g2_min',desc:'G2 minimum BGT_PICKER'},
          {g:'G3',c:'var(--gold)',k1:'g3_min',desc:'G3 minimum BGT_PICKER'}]
          .map(({g,c,k1,desc})=><div key={g} className="card2" style={{borderLeft:`3px solid ${c}`}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}><GPill g={g}/><span style={{fontSize:'.73rem',fontWeight:600,color:c}}>{g} Threshold</span></div>
            <div className="fg"><label className="lbl">{desc}</label>
              <input type="number" value={lc[k1]||{g1_min:3000,g2_min:2000,g3_min:1}[k1]||0} min={0} max={99999} step={100}
                onChange={e=>upd(k1,+e.target.value)} style={{fontFamily:'var(--mono)'}}/>
            </div>
          </div>)}
      </div>
      <div className="hint">BGT ≥ G1_min → G1 · BGT ≥ G2_min (and &lt; G1_min) → G2 · else → G3. These labels are display-only and do not restrict allocation.</div>
    </div>

    <div className="sbox">
      <div className="sbox-t">🧠 Allocation Algorithm Reference</div>
      <div className="g2" style={{gap:14}}>
        <div>
          {[['No DO Splitting','Each DO assigned to exactly one picker'],['Priority Order','DOs sorted PRIORITY → SEC → DO_NO per floor'],
            ['Continuous Greedy','Each picker picks next available slot — no idle'],['Lunch Auto-Skip','Allocations skip over configured lunch window'],
            ['Group Matching','G1→high-P; G2→mid-P; G3→low-P. Overflow to adjacent'],['Cross-date Lock','Planned/Done/Delayed DOs locked across all dates']]
            .map(([r,d])=><div key={r} style={{display:'flex',gap:7,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{color:'var(--green)',flexShrink:0,fontFamily:'var(--mono)',fontSize:'.67rem'}}>✓</span>
              <div><div style={{fontSize:'.7rem',fontWeight:600}}>{r}</div><div style={{fontSize:'.62rem',color:'var(--muted)'}}>{d}</div></div>
            </div>)}
        </div>
        <div>
          <div style={{fontSize:'.65rem',fontWeight:600,marginBottom:8,color:'var(--t2)'}}>Formula Reference</div>
          {[['PCS / Min','BGT_MACHINE ÷ Effective Minutes'],['DO Duration','DO_QTY ÷ PCS/min (minutes)'],
            ['Effective Min','Shift Duration − Lunch Duration'],['Req Pickers','ceil(Floor QTY ÷ (BGT × fill%))'],
            ['Token Format','PKP-YYYYMMDD-R{nn}'],['Utilisation','cap_used ÷ BGT_MACHINE × 100%']]
            .map(([l,f])=><div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border)',gap:8}}>
              <span style={{fontSize:'.67rem',color:'var(--m2)'}}>{l}</span>
              <code style={{fontSize:'.63rem',color:'var(--cyan)',fontFamily:'var(--mono)',textAlign:'right'}}>{f}</code>
            </div>)}
          <div className="divider"/>
          <div style={{fontSize:'.65rem',fontWeight:600,marginBottom:6,color:'var(--t2)'}}>Database Info</div>
          {[['Engine','SQLite 3 (WAL mode)'],['File','picker_planning.db (auto-created)'],['Tables','plans, plan_details, picker_day_state, actual_times']].map(([l,v])=>
            <div key={l} style={{display:'flex',gap:8,padding:'4px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:'.62rem',color:'var(--muted)',width:65,flexShrink:0}}>{l}</span>
              <code style={{fontSize:'.62rem',color:'var(--cyan)',fontFamily:'var(--mono)'}}>{v}</code>
            </div>)}
        </div>
      </div>
    </div>
  </div>;
}

// ── NEW PLAN PAGE ────────────────────────────────────────────────────────────
function NewPlanPage({cfg,toast}){
  const[file,setFile]=useState(null);const[parsed,setParsed]=useState(null);
  const[loading,setLoading]=useState(false);const[gen,setGen]=useState(false);const[floorAvail,setFloorAvail]=useState({});const[floorReq,setFloorReq]=useState({});
  const[date_,setDate]=useState(new Date().toISOString().slice(0,10));
  const[notes,setNotes]=useState('');const[result,setResult]=useState(null);
  const[drag,setDrag]=useState(false);const[sub,setSub]=useState('dos');
  const[qF,setQF]=useState('');const[flF,setFlF]=useState('All');
  const[prF,setPrF]=useState('All');const[grF,setGrF]=useState('All');
  const[ovF,setOvF]=useState('All');

  const upload=async f=>{
    if(!f)return;setFile(f);setParsed(null);setResult(null);setLoading(true);
    try{const fd=new FormData();fd.append('file',f);const d=await apiFetch(`/api/excel/parse?fill_pct=${cfg.fill_pct}&bgt=${cfg.bgt}`,{method:'POST',body:fd});setParsed(d);setFloorAvail(d.floor_avail||{});setFloorReq(d.floor_required||{});toast(`✓ ${d.summary.total_dos} DOs · ${d.summary.total_machines||d.summary.machines} machines · G1:${d.summary.g1_count||0} G2:${d.summary.g2_count||0} G3:${d.summary.g3_count||0}`,'ok');}
    catch(e){toast(e.message,'err');}finally{setLoading(false);}
  };

  const generate=async()=>{
    if(!parsed)return;setGen(true);setResult(null);
    try{
      const eff=cfg.wh_end-cfg.start_min-(cfg.lunch_e-cfg.lunch_s);
      const d=await apiFetch('/api/plans/generate',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({plan_date:date_,notes,cfg:{...cfg,eff_min:eff},dos:parsed.dos,machines:parsed.machines})});
      if(d.error){toast(d.message,'err');setResult(d);}
      else{toast(`Plan ${d.token} saved — ${d.total_dos} DOs`,'ok');setResult(d);setSub('dos');}
    }catch(e){toast(e.message,'err');}finally{setGen(false);}
  };

  const filtered=useMemo(()=>{
    if(!result?.details)return[];let r=result.details;
    const q=qF.toLowerCase();
    if(q)r=r.filter(d=>[d.do_no,d.sec,d.machine_no,d.scanner_name].some(v=>String(v||'').toLowerCase().includes(q)));
    if(flF!=='All')r=r.filter(d=>String(d.floor)===flF);
    if(prF!=='All')r=r.filter(d=>String(d.priority)===prF.replace('P',''));
    if(grF!=='All')r=r.filter(d=>d.grp===grF);
    if(ovF==='Over WH')r=r.filter(d=>d.over_wh);
    if(ovF==='On Time')r=r.filter(d=>!d.over_wh);
    return r;
  },[result?.details,qF,flF,prF,grF,ovF]);

  const pickerSched=useMemo(()=>{
    if(!result?.details)return[];const m={};
    result.details.forEach(d=>{
      const k=`${d.floor}-${d.picker_no}`;
      if(!m[k])m[k]={floor:d.floor,picker_no:d.picker_no,machine_no:d.machine_no,scanner:d.scanner_name,grp:d.grp,bgt:d.bgt_machine,dos:0,qty:0,start:d.start_time,end:d.end_time,util:0,prios:[]};
      m[k].dos++;m[k].qty+=d.do_qty;
      if(d.start_time<m[k].start)m[k].start=d.start_time;
      if(d.end_time>m[k].end)m[k].end=d.end_time;
      if((d.util_pct||0)>m[k].util)m[k].util=d.util_pct||0;
      if(!m[k].prios.includes(d.priority))m[k].prios.push(d.priority);
    });
    return Object.values(m).sort((a,b)=>a.floor-b.floor||a.picker_no-b.picker_no);
  },[result?.details]);

  const{page:p1,setPage:sp1,total:t1,slice:s1}=usePager(filtered,60);
  const floors=result?.details?[...new Set(result.details.map(d=>d.floor))].sort():[];
  const prios=result?.details?[...new Set(result.details.map(d=>d.priority))].sort((a,b)=>a-b):[];

  return<div>
    <div className="g23" style={{gap:16,marginBottom:14}}>
      {/* LEFT */}
      <div>
        <div className="sec">Upload & Configure</div>
        <div className={`drop${drag?' dg':''}`} style={{marginBottom:10}}
          onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);upload(e.dataTransfer.files[0])}}
          onClick={()=>document.getElementById('up').click()}>
          {loading?<div className="ctr" style={{padding:20}}><Spin/></div>:<>
            <div style={{fontSize:'2rem',marginBottom:8}}>📋</div>
            <div style={{fontWeight:600,fontSize:'.82rem',marginBottom:4}}>{file?file.name:'Drop TEMPLATE.xlsx here'}</div>
            <div style={{fontSize:'.68rem',color:'var(--muted)'}}>Requires DO + MACHINE sheets · xlsx or xls</div>
          </>}
        </div>
        <input id="up" type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>upload(e.target.files[0])}/>

        {parsed&&<div className="al al-o" style={{fontSize:'.73rem',marginBottom:10}}>
          ✓ <b>{parsed.summary.total_dos}</b> DOs · <b>{parseInt(parsed.summary.total_qty).toLocaleString()}</b> pcs
          · <b>{parsed.summary.machines}</b> machines · Floors: {parsed.summary.floors.join(', ')}
          {parsed.summary.priorities?.length?` · P${parsed.summary.priorities[0]}–P${parsed.summary.priorities[parsed.summary.priorities.length-1]}`:''}
        </div>}

        <div className="g2" style={{gap:9,marginBottom:10}}>
          <div className="fg"><label className="lbl">Plan Date</label>
            <input type="date" value={date_} onChange={e=>setDate(e.target.value)}/></div>
          <div className="fg"><label className="lbl">Notes (optional)</label>
            <input type="text" value={notes} placeholder="e.g. Morning batch R1" onChange={e=>setNotes(e.target.value)}/></div>
        </div>

        {result&&!result.error&&<div className="al al-i" style={{fontSize:'.72rem',marginBottom:10}}>
          🔁 <b>Run #{result.run_number}</b> for {result.plan_date}
          {result.plan_start&&<> · ⏰ Starts <b>{result.plan_start}</b> {result.plan_start==='08:00'?' (shift start)':' (mid-shift)'}</>}
          {result.excluded_count>0&&<> · <b>{result.excluded_count} DOs excluded</b> (locked)</>}
        </div>}

        <button className="btn btn-p btn-fw btn-lg" disabled={!parsed||gen} onClick={generate}>
          {gen?<><Spin sm/>&nbsp;Allocating...</>:'⚡ Run Allocation'}
        </button>
        {result?.error&&<div className="al al-e" style={{marginTop:10}}>{result.message}</div>}
      </div>

      {/* RIGHT */}
      <div>
        {parsed&&!result&&<>
          <div className="sec">Machine Pool — Available vs Required</div>
          <MachineAvailability grp_summary={parsed.grp_summary} floor_avail={floorAvail} floor_required={floorReq} summary={parsed.summary} cfg={cfg}/>
          <div className="sec">Demand Analysis — Floor Breakdown</div>
          <DemandTable dos={parsed.dos} cfg={cfg}/>
        </>}

        {result&&!result.error&&<>
          <div className="tok-box" style={{marginBottom:11}}>
            <div style={{fontSize:'.58rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:3}}>Plan Saved to DB</div>
            <div className="tok-v">{result.token}</div>
            <div className="tok-m">{result.plan_date} · Run #{result.run_number}{notes?` · ${notes}`:''}</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:7,marginBottom:10}}>
            {[{l:'DOs Allocated',v:result.total_dos,c:'bl'},{l:'Total QTY',v:parseInt(result.total_qty).toLocaleString(),c:'gr'},
              {l:'Pickers Used',v:result.pickers_used,c:'pu'},{l:'Avg Util',v:`${result.avg_util}%`,c:result.avg_util>=cfg.fill_pct?'gr':'go'},
              {l:'Skipped',v:result.skipped,c:result.skipped>0?'re':'gr'},{l:'Excluded',v:result.excluded_count||0,c:result.excluded_count>0?'go':'gr'},
              {l:'Plan Start',v:result.plan_start||'08:00',c:'cy',s:result.plan_start&&result.plan_start!=='08:00'?'mid-shift':'shift start'}]
              .map(k=><div key={k.l} className={`kpi ${k.c}`} style={{padding:'9px 11px'}}><div className="kl">{k.l}</div><div className="kv" style={{fontSize:'1.05rem'}}>{k.v}</div></div>)}
          </div>
          {result.grp_summary&&<MachineAvailability grp_summary={result.grp_summary} floor_avail={floorAvail} floor_required={floorReq} summary={parsed?.summary} cfg={cfg}/>}
          <a href={`${API}/api/plans/${result.token}/excel`} download style={{display:'block'}}>
            <button className="btn btn-gr btn-fw" style={{marginBottom:6}}>⬇️ Download Plan Excel (4 sheets)</button>
          </a>
          {result.skipped>0&&<div className="al al-w" style={{fontSize:'.72rem'}}>
            ⚠ {result.skipped} DOs unallocated.
            <details style={{marginTop:4}}><summary style={{cursor:'pointer',fontSize:'.66rem'}}>Show list</summary>
              <div style={{maxHeight:90,overflowY:'auto',marginTop:4}}>
                {result.skipped_list?.map((s,i)=><div key={i} style={{padding:'1px 0',fontSize:'.66rem'}}><b>{s.do_no}</b> — {s.reason}</div>)}
              </div></details>
          </div>}
        </>}
      </div>
    </div>

    {/* PLAN DETAILS */}
    {result&&!result.error&&result.details?.length>0&&<>
      <div className="sec">Plan Details</div>
      <div className="stabs">
        {[['dos',`📋 DOs (${result.total_dos})`],['schedule','👷 Picker Schedule'],['gantt','📊 Gantt'],['unalloc',`⚠️ Unallocated (${result.skipped})`]].map(([id,lbl])=>
          <div key={id} className={`stab${sub===id?' on':''}`} onClick={()=>setSub(id)}>{lbl}</div>)}
      </div>

      {sub==='dos'&&<>
        <div className="fbar">
          <input style={{minWidth:190,height:31,fontSize:'.73rem'}} placeholder="🔍 DO No / SEC / Machine..." value={qF} onChange={e=>setQF(e.target.value)}/>
          <select style={{height:31,width:'auto',fontSize:'.73rem'}} value={flF} onChange={e=>setFlF(e.target.value)}>
            <option>All</option>{floors.map(f=><option key={f}>F{f}</option>)}
          </select>
          <select style={{height:31,width:'auto',fontSize:'.73rem'}} value={prF} onChange={e=>setPrF(e.target.value)}>
            <option>All</option>{prios.map(p=><option key={p}>P{p}</option>)}
          </select>
          <select style={{height:31,width:'auto',fontSize:'.73rem'}} value={grF} onChange={e=>setGrF(e.target.value)}>
            <option>All</option>{['G1','G2','G3'].map(g=><option key={g}>{g}</option>)}
          </select>
          <select style={{height:31,width:'auto',fontSize:'.73rem'}} value={ovF} onChange={e=>setOvF(e.target.value)}>
            <option>All</option><option>Over WH</option><option>On Time</option>
          </select>
          <span style={{fontSize:'.68rem',color:'var(--muted)'}}>{filtered.length} rows</span>
        </div>
        <div className="tw xl">
          <table className="dt"><thead><tr>
            {['P#','DO No','Floor','SEC','QTY','Picker','Machine','Scanner','Grp','BGT','Start','End','Dur','Util%','Over WH'].map(h=><th key={h}>{h}</th>)}
          </tr></thead><tbody>
            {s1.map((d,i)=><tr key={i}>
              <td><span className="pill pP" style={{background:`rgba(59,130,246,${Math.min(.35,.07+d.priority*.025)})`}}>P{d.priority}</span></td>
              <td style={{fontWeight:700,color:'var(--t2)'}}>{d.do_no}</td>
              <td><FL f={d.floor}/></td>
              <td>{d.sec}</td>
              <td className="n">{(d.do_qty||0).toLocaleString()}</td>
              <td className="n">{d.picker_no}</td>
              <td style={{fontWeight:600}}>{d.machine_no}</td>
              <td style={{color:'var(--muted)',fontSize:'.62rem'}}>{d.scanner_name||'—'}</td>
              <td><GPill g={d.grp}/></td>
              <td className="n">{(d.bgt_machine||0).toLocaleString()}</td>
              <td style={{color:'var(--accent)'}}>{d.start_time}</td>
              <td style={{color:d.over_wh?'var(--red)':'var(--muted)'}}>{d.end_time}</td>
              <td className="n">{Math.round(d.duration_min||0)}m</td>
              <td className="n">
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <div className="pb sl" style={{width:50}}>
                    <div className="pbf" style={{width:`${d.util_pct}%`,background:(d.util_pct||0)>=cfg.fill_pct?'var(--green)':'var(--gold)'}}/>
                  </div>
                  <span style={{fontSize:'.62rem',color:(d.util_pct||0)>=cfg.fill_pct?'var(--green)':'var(--gold)'}}>{d.util_pct}%</span>
                </div>
              </td>
              <td>{d.over_wh?<span style={{color:'var(--red)'}}>⚠ Over</span>:<span style={{color:'var(--muted)'}}>✓</span>}</td>
            </tr>)}
          </tbody></table>
        </div>
        <Pager page={p1} total={t1} setPage={sp1} count={filtered.length}/>
      </>}

      {sub==='schedule'&&<div className="tw xl">
        <table className="dt"><thead><tr>
          {['Floor','Picker','Machine','Scanner','Grp','BGT','DOs','QTY','Priorities','Start','End','Util%'].map(h=><th key={h}>{h}</th>)}
        </tr></thead><tbody>
          {pickerSched.map((r,i)=><tr key={i}>
            <td><FL f={r.floor}/></td><td className="n">{r.picker_no}</td>
            <td style={{fontWeight:600}}>{r.machine_no}</td>
            <td style={{color:'var(--muted)',fontSize:'.62rem'}}>{r.scanner||'—'}</td>
            <td><GPill g={r.grp}/></td>
            <td className="n">{(r.bgt||0).toLocaleString()}</td>
            <td className="n">{r.dos}</td><td className="n">{r.qty.toLocaleString()}</td>
            <td style={{fontSize:'.6rem',color:'var(--muted)'}}>{r.prios.sort((a,b)=>a-b).map(p=>`P${p}`).join(' → ')}</td>
            <td style={{color:'var(--accent)'}}>{r.start}</td>
            <td style={{color:'var(--muted)'}}>{r.end}</td>
            <td>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <div className="pb sl" style={{width:55}}>
                  <div className="pbf" style={{width:`${r.util}%`,background:r.util>=cfg.fill_pct?'var(--green)':'var(--gold)'}}/>
                </div>
                <span style={{fontSize:'.63rem',color:r.util>=cfg.fill_pct?'var(--green)':'var(--gold)',fontFamily:'var(--mono)'}}>{r.util}%</span>
              </div>
            </td>
          </tr>)}
        </tbody></table>
      </div>}

      {sub==='gantt'&&<GanttView details={result.details} wsMin={cfg.start_min} weMin={cfg.wh_end} fill={cfg.fill_pct}/>}

      {sub==='unalloc'&&(result.skipped_list?.length?
        <div className="tw md"><table className="dt"><thead><tr><th>DO No</th><th>Reason</th></tr></thead>
          <tbody>{result.skipped_list.map((s,i)=><tr key={i}><td style={{fontWeight:600}}>{s.do_no}</td><td style={{color:'var(--muted)'}}>{s.reason}</td></tr>)}</tbody>
        </table></div>:
        <div className="al al-o">✓ All DOs allocated successfully.</div>)}
    </>}
  </div>;
}

// ── HISTORY PAGE ─────────────────────────────────────────────────────────────
function HistoryPage({toast}){
  const[plans,setPlans]=useState([]);const[loading,setLoading]=useState(true);
  const[sel,setSel]=useState(null);const[detail,setDetail]=useState(null);
  const[detL,setDetL]=useState(false);const[dateF,setDateF]=useState('');
  const[confirm,setConfirm]=useState(null);
  const load=async()=>{setLoading(true);try{setPlans(await apiFetch('/api/plans'));}catch(e){toast(e.message,'err');}finally{setLoading(false);}};
  useEffect(()=>{load();},[]);
  const loadDet=async tok=>{setSel(tok);setDetail(null);setDetL(true);
    try{setDetail(await apiFetch(`/api/plans/${tok}`));}catch(e){toast(e.message,'err');}finally{setDetL(false);}};
  const cancelPlan=async tok=>{
    try{await apiFetch(`/api/plans/${tok}`,{method:'DELETE'});toast(`${tok} cancelled — DOs unlocked`,'ok');setConfirm(null);setSel(null);setDetail(null);load();}
    catch(e){toast(e.message,'err');}};
  const filtered=useMemo(()=>dateF?plans.filter(p=>p.plan_date===dateF):plans,[plans,dateF]);
  const dates=[...new Set(plans.map(p=>p.plan_date))].sort().reverse();
  const byDate=useMemo(()=>{const m={};filtered.forEach(p=>{if(!m[p.plan_date])m[p.plan_date]=[];m[p.plan_date].push(p);});return m;},[filtered]);
  const daySummary=useMemo(()=>{
    if(!dateF)return null;const dp=plans.filter(p=>p.plan_date===dateF);
    if(!dp.length)return null;
    return{runs:dp.length,dos:dp.reduce((s,p)=>s+p.total_dos,0),qty:dp.reduce((s,p)=>s+p.total_qty,0),avgUtil:(dp.reduce((s,p)=>s+p.avg_util,0)/dp.length).toFixed(1)};
  },[dateF,plans]);
  return<div>
    {confirm&&<Confirm title="Cancel Plan" body={`Cancel ${confirm}? All DOs will be freed for re-planning.`} onOk={()=>cancelPlan(confirm)} onCancel={()=>setConfirm(null)}/>}

    {!loading&&plans.length>0&&<div className="g5" style={{gap:8,marginBottom:14}}>
      {[{l:'Total Plans',v:plans.length,c:'bl'},{l:'Plan Dates',v:[...new Set(plans.map(p=>p.plan_date))].length,c:'pu'},
        {l:'Total DOs',v:plans.reduce((s,p)=>s+p.total_dos,0).toLocaleString(),c:'gr'},
        {l:'Total QTY',v:plans.reduce((s,p)=>s+p.total_qty,0).toLocaleString(),c:'cy'},
        {l:'Avg Util',v:`${(plans.reduce((s,p)=>s+p.avg_util,0)/plans.length).toFixed(1)}%`,c:'go'}]
        .map(k=><div key={k.l} className={`kpi ${k.c}`} style={{padding:'9px 11px'}}><div className="kl">{k.l}</div><div className="kv" style={{fontSize:'1rem'}}>{k.v}</div></div>)}
    </div>}

    <div style={{display:'flex',gap:14}}>
      {/* LIST */}
      <div style={{width:280,flexShrink:0}}>
        <div style={{display:'flex',gap:6,marginBottom:8}}>
          <select value={dateF} onChange={e=>setDateF(e.target.value)} style={{flex:1,height:31,fontSize:'.73rem'}}>
            <option value="">All dates</option>{dates.map(d=><option key={d}>{d}</option>)}

          {dateF&&<button className="btn btn-g btn-sm" onClick={()=>setDateF('')}>✕</button>}
        </div>
        {daySummary&&<div className="card2" style={{marginBottom:8,borderLeft:'3px solid var(--accent)',padding:'10px 12px'}}>
          <div style={{fontSize:'.6rem',color:'var(--accent)',fontWeight:700,marginBottom:5}}>{dateF} — Day Total</div>
          <div className="g2" style={{gap:5}}>
            {[{l:'Runs',v:daySummary.runs},{l:'DOs',v:daySummary.dos},{l:'QTY',v:daySummary.qty?.toLocaleString()},{l:'Avg Util',v:`${daySummary.avgUtil}%`}]
              .map(x=><div key={x.l} style={{fontSize:'.67rem'}}><span style={{color:'var(--muted)'}}>{x.l}: </span><b style={{fontFamily:'var(--mono)'}}>{x.v}</b></div>)}
          </div>
          {dateF&&plans.filter(p=>p.plan_date===dateF).length>1&&<a href={`${API}/api/plans/combined-excel?date=${dateF}`} download style={{display:'block',marginTop:8}}>
            <button className="btn btn-gr btn-sm btn-fw">📦 Combined Excel (All Runs)</button>
          </a>}
        </div>}
        {loading?<div className="ctr" style={{padding:24}}><Spin/></div>:
          Object.entries(byDate).sort(([a],[b])=>b.localeCompare(a)).map(([date,dps])=><div key={date} style={{marginBottom:7}}>
            <div style={{background:'var(--s1)',borderRadius:4,padding:'3px 8px',marginBottom:3,fontSize:'.56rem',fontFamily:'var(--mono)',color:'var(--muted)',display:'flex',justifyContent:'space-between'}}>
              <span>{date}</span><span>{dps.length} run{dps.length>1?'s':''}</span>
            </div>
            {dps.map(p=><div key={p.token} className="card2" style={{marginBottom:4,cursor:'pointer',border:sel===p.token?'1px solid var(--accent)':'1px solid var(--border)',padding:'9px 11px'}} onClick={()=>loadDet(p.token)}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontFamily:'var(--mono)',fontSize:'.7rem',fontWeight:700,color:sel===p.token?'var(--accent)':'var(--t2)'}}>{p.token}</span>
                <span style={{fontSize:'.57rem',color:'var(--muted)'}}>R{p.run_number}</span>
              </div>
              <div style={{fontSize:'.63rem',color:'var(--muted)',display:'flex',gap:7,marginBottom:3}}>
                <span>📦{p.total_dos}</span><span>⚡{p.pickers_used}</span><span>📊{p.avg_util}%</span><span>⏭{p.skipped_dos||0}</span>
              </div>
              {p.status_breakdown&&<div style={{display:'flex',gap:2,flexWrap:'wrap'}}>
                {Object.entries(p.status_breakdown).map(([s,c])=><span key={s} style={{fontSize:'.52rem',padding:'1px 5px',borderRadius:8,fontFamily:'var(--mono)',background:'rgba(255,255,255,.03)',border:`1px solid ${STCL[s]||'#666'}33`,color:STCL[s]||'var(--muted)'}}>{s.slice(0,4)} {c}</span>)}
              </div>}
            </div>)}
          </div>)}
      </div>

      {/* DETAIL */}
      <div style={{flex:1}}>
        {!sel&&<div className="al al-i">← Select a plan from the list to view details and actions.</div>}
        {detL&&<div className="ctr" style={{padding:40}}><Spin/></div>}
        {detail&&<>
          <div style={{display:'flex',gap:9,marginBottom:11,alignItems:'flex-start'}}>
            <div className="tok-box" style={{flex:1,textAlign:'left',padding:'11px 16px'}}>
              <div className="tok-v" style={{fontSize:'1.5rem'}}>{detail.meta.token}</div>
              <div className="tok-m">{detail.meta.plan_date} · Run #{detail.meta.run_number}{detail.meta.notes?` · ${detail.meta.notes}`:''}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <a href={`${API}/api/plans/${sel}/excel`} download><button className="btn btn-gr btn-sm" style={{whiteSpace:'nowrap'}}>⬇️ Download Excel</button></a>
              <button className="btn btn-d btn-sm" onClick={()=>setConfirm(sel)}>🗑️ Cancel Plan</button>
              <button className="btn btn-g btn-sm" title="Recalculate machine available times from active DOs only"
                onClick={async()=>{try{await apiFetch(`/api/plans/${sel}/rebuild-state`,{method:'POST'});toast('Machine state rebuilt — cancelled DOs freed','ok');}catch(e){toast(e.message,'err');}}}>
                🔄 Rebuild State
              </button>
            </div>
          </div>
          <div className="g5" style={{gap:8,marginBottom:11}}>
            {[{l:'Total DOs',v:detail.meta.total_dos,c:'bl'},{l:'Total QTY',v:(detail.meta.total_qty||0).toLocaleString(),c:'gr'},
              {l:'Pickers Used',v:detail.meta.pickers_used,c:'pu'},{l:'Avg Util',v:`${detail.meta.avg_util}%`,c:detail.meta.avg_util>=70?'gr':'go'},
              {l:'Skipped',v:detail.meta.skipped_dos||0,c:(detail.meta.skipped_dos||0)>0?'re':'gr'}]
              .map(k=><div key={k.l} className={`kpi ${k.c}`} style={{padding:'9px 11px'}}><div className="kl">{k.l}</div><div className="kv" style={{fontSize:'1rem'}}>{k.v}</div></div>)}
          </div>
          {detail.meta.status_breakdown&&<div className="card" style={{marginBottom:11}}>
            <div style={{fontSize:'.58rem',color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>Status Breakdown</div>
            <div className="sbar" style={{marginBottom:7}}>
              {Object.entries(detail.meta.status_breakdown).map(([s,c])=>{const pct=(c/detail.meta.total_dos*100).toFixed(1);return<div key={s} className="sbs" style={{width:`${pct}%`,background:STCL[s]||'#666'}} title={`${s}: ${c}`}/>;})}</div>
            <div style={{display:'flex',gap:9,flexWrap:'wrap'}}>
              {Object.entries(detail.meta.status_breakdown).map(([s,c])=><span key={s} style={{fontSize:'.63rem',display:'flex',alignItems:'center',gap:3}}>
                <span style={{width:8,height:8,borderRadius:2,background:STCL[s]||'#666',display:'inline-block',flexShrink:0}}/>{s}: <b style={{fontFamily:'var(--mono)'}}>{c}</b></span>)}
            </div>
          </div>}
          <div className="tw tl">
            <table className="dt"><thead><tr>
              <th>Status</th><th>DO No</th><th>Floor</th><th>SEC</th><th>P#</th><th>QTY</th>
              <th>Picker</th><th>Machine</th><th>Start</th><th>End</th><th>Act Start</th><th>Act End</th>
            </tr></thead><tbody>
              {detail.details.slice(0,300).map((d,i)=><tr key={i}>
                <td><SPill s={d.status||'Planned'}/></td>
                <td style={{fontWeight:700}}>{d.do_no}</td><td><FL f={d.floor}/></td>
                <td>{d.sec}</td><td>P{d.priority}</td>
                <td className="n">{(d.do_qty||0).toLocaleString()}</td>
                <td className="n">{d.picker_no}</td><td>{d.machine_no}</td>
                <td style={{color:'var(--accent)'}}>{d.start_time}</td>
                <td style={{color:'var(--muted)'}}>{d.end_time}</td>
                <td style={{color:'var(--green)'}}>{d.actual_start||'—'}</td>
                <td style={{color:'var(--green)'}}>{d.actual_end||'—'}</td>
              </tr>)}
            </tbody></table>
          </div>
          {detail.details.length>300&&<div className="hint" style={{textAlign:'center',padding:5}}>Showing first 300 of {detail.details.length}. Download Excel for full data.</div>}
        </>}
      </div>
    </div>
  </div>;
}

// ── ACTUAL TIMES PAGE ─────────────────────────────────────────────────────────
function ActualTimesPage({toast}){
  const[plans,setPlans]=useState([]);const[sel,setSel]=useState('');
  const[detail,setDetail]=useState(null);const[loading,setLoading]=useState(false);
  const[saving,setSaving]=useState(false);const[times,setTimes]=useState({});const todayStr=new Date().toISOString().slice(0,10);
  const[flF,setFlF]=useState('all');const[pkF,setPkF]=useState('all');const[search,setSearch]=useState('');const[stF,setStF]=useState('all');const[dirty,setDirty]=useState(false);
  const[bulkO,setBulkO]=useState(false);const[bulkF,setBulkF]=useState(null);const[bulkS,setBulkS]=useState(false);
  const[bulkSH,setBulkSH]=useState('08');const[bulkEH,setBulkEH]=useState('17');
  const[bulkSM,setBulkSM]=useState('00');const[bulkEM,setBulkEM]=useState('00');
  useEffect(()=>{apiFetch('/api/plans').then(setPlans).catch(e=>toast(e.message,'err'));},[]);
  const loadDet=async tok=>{
    setSel(tok);setDetail(null);setTimes({});if(!tok)return;
    setLoading(true);
    try{const d=await apiFetch(`/api/plans/${tok}`);setDetail(d);
      const t={};d.details.forEach(r=>{if(r.actual_start)t[r.do_no]={date:r.actual_date||d.meta.plan_date||new Date().toISOString().slice(0,10),start:r.actual_start,end:r.actual_end||'',notes:r.actual_notes||''};});
      setTimes(t);
    }catch(e){toast(e.message,'err');}finally{setLoading(false);}};
  const setT=(dn,f,v)=>{setTimes(t=>({...t,[dn]:{...(t[dn]||{}),[f]:v}}));setDirty(true);};
  const applyBulk=()=>{
    const s=`${bulkSH}:${bulkSM}`,e=`${bulkEH}:${bulkEM}`;
    rows.forEach(d=>setTimes(t=>({...t,[d.do_no]:{...(t[d.do_no]||{}),start:s,end:e}})));
    toast(`Bulk applied to ${rows.length} rows`,'info');setDirty(true);
  };
  const clearAll=()=>{setTimes({});toast('Cleared all times','info');};
  const save=async()=>{
    if(!sel||!detail)return;setSaving(true);
    try{
      const recs=Object.entries(times).filter(([,v])=>v.start&&v.end).map(([dn,v])=>({do_no:dn,actual_start:v.start,actual_end:v.end,actual_date:v.date||detail.meta.plan_date,actual_qty:0,notes:v.notes||'',plan_date:detail.meta.plan_date}));
      if(!recs.length){toast('No times filled','warn');return;}
      const res=await apiFetch(`/api/actuals/${sel}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(recs)});
      toast(`✓ Saved ${res.saved} records`,'ok');setDirty(false);loadDet(sel);
    }catch(e){toast(e.message,'err');}finally{setSaving(false);}};
  const bulkUpload=async()=>{
    if(!bulkF||!sel)return;setBulkS(true);
    try{const fd=new FormData();fd.append('file',bulkF);const res=await apiFetch(`/api/actuals/${sel}/bulk-upload`,{method:'POST',body:fd});
      if(res.success){toast(`✓ Bulk uploaded ${res.saved} records`,'ok');loadDet(sel);setBulkO(false);}else toast(res.message,'err');
    }catch(e){toast(e.message,'err');}finally{setBulkS(false);}};

  const floors=useMemo(()=>detail?[...new Set(detail.details.map(d=>d.floor))].sort():[],[detail]);
  const pickers=useMemo(()=>{
    if(!detail)return[];
    return[...new Set(detail.details.filter(d=>flF==='all'||String(d.floor)===flF).map(d=>d.picker_no))].sort((a,b)=>a-b);
  },[detail,flF]);
  const rows=useMemo(()=>{
    if(!detail)return[];let r=detail.details;
    if(flF!=='all')r=r.filter(d=>String(d.floor)===flF);
    if(pkF!=='all')r=r.filter(d=>String(d.picker_no)===pkF);
    if(stF!=='all')r=r.filter(d=>(d.status||'Planned')===stF||(stF==='pending'&&(d.status||'Planned')==='Planned'));
    if(search.trim()){const q=search.toLowerCase();r=r.filter(d=>[d.do_no,d.machine_no,d.sec,d.scanner_name].some(v=>String(v||'').toLowerCase().includes(q)));}
    return r;
  },[detail,flF,pkF,stF,search]);
  const filled=Object.values(times).filter(v=>v.start&&v.end).length;
  const varLabel=(ps,pe,as,ae)=>{
    const dm=(s,e)=>{try{const[h1,m1]=s.split(':').map(Number);const[h2,m2]=e.split(':').map(Number);return(h2*60+m2)-(h1*60+m1);}catch{return null;}};
    const pd=dm(ps,pe),ad=as&&ae?dm(as,ae):null;
    if(ad===null||pd===null)return{t:'—',c:'var(--muted)'};
    const v=ad-pd;return v===0?{t:'On time',c:'var(--green)'}:v>0?{t:`+${v}m slow`,c:'var(--red)'}:{t:`${v}m fast`,c:'var(--cyan)'};
  };
  const hrs=[...Array(24)].map((_,i)=>String(i).padStart(2,'0'));
  const mins=[...Array(60)].map((_,i)=>String(i).padStart(2,'0'));

  // picker completion for selected floor
  const pkMeta=useMemo(()=>{
    if(!detail||flF==='all')return null;
    const fd=detail.details.filter(d=>String(d.floor)===flF);
    if(pkF==='all')return{dos:fd.length,done:fd.filter(d=>times[d.do_no]?.start&&times[d.do_no]?.end).length};
    const pkd=fd.filter(d=>String(d.picker_no)===pkF);
    const g=pkd[0]?.grp,mno=pkd[0]?.machine_no;
    return{dos:pkd.length,done:pkd.filter(d=>times[d.do_no]?.start&&times[d.do_no]?.end).length,grp:g,machine:mno,start:pkd[0]?.start_time,end:pkd[pkd.length-1]?.end_time};
  },[detail,flF,pkF,times]);

  return<div>
    <div className="g23" style={{gap:14,marginBottom:14}}>
      <div>
        <div className="sec">Select Plan & Filter</div>
        <select value={sel} onChange={e=>loadDet(e.target.value)} style={{marginBottom:10,fontSize:'.75rem'}}>
          <option value="">— Select plan token —</option>
          {plans.map(p=><option key={p.token} value={p.token}>{p.token} · {p.plan_date} · {p.total_dos} DOs</option>)}
        </select>
        {sel&&<>
          <div style={{marginBottom:8}}>
            <input style={{fontSize:'.75rem',height:33}} placeholder="🔍 Search DO No / Machine / SEC / Scanner..."
              value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div className="g2" style={{gap:9,marginBottom:9}}>
            <div className="fg"><label className="lbl">Floor</label>
              <select value={flF} onChange={e=>{setFlF(e.target.value);setPkF('all');}}>
                <option value="all">All Floors</option>
                {floors.map(f=><option key={f} value={f}>Floor {f}</option>)}
              </select></div>
            <div className="fg"><label className="lbl">Picker</label>
              <select value={pkF} onChange={e=>setPkF(e.target.value)}>
                <option value="all">All Pickers</option>
                {pickers.map(p=><option key={p} value={p}>Picker {p}</option>)}
              </select></div>
            <div className="fg"><label className="lbl">Status</label>
              <select value={stF} onChange={e=>setStF(e.target.value)}>
                <option value="all">All</option>
                <option value="pending">Pending (Planned)</option>
                {['Done','Delayed','Not Picked','Cancelled'].map(s=><option key={s} value={s}>{s}</option>)}
              </select></div>
          </div>

          {/* Picker meta bar */}
          {pkMeta&&<div className="card2" style={{marginBottom:9,padding:'9px 12px'}}>
            {pkF!=='all'&&<div style={{fontSize:'.68rem',color:'var(--m2)',marginBottom:5}}>
              <b style={{color:'var(--text)'}}>Picker {pkF}</b>
              {pkMeta.grp&&<> · <span style={{color:{G1:'var(--green)',G2:'var(--accent)',G3:'var(--gold)'}[pkMeta.grp]||'var(--accent)',fontWeight:700}}>{pkMeta.grp}</span></>}
              {pkMeta.machine&&<> · Machine {pkMeta.machine}</>}
              {pkMeta.start&&<> · Planned {pkMeta.start}→{pkMeta.end}</>}
              · <b style={{color:'var(--green)'}}>{pkMeta.done} done</b>/{pkMeta.dos}
            </div>}
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div className="pb sl" style={{flex:1}}>
                <div className="pbf" style={{width:`${Math.round(pkMeta.done/Math.max(1,pkMeta.dos)*100)}%`,background:'var(--green)'}}/>
              </div>
              <span style={{fontSize:'.62rem',color:'var(--green)',fontFamily:'var(--mono)',flexShrink:0}}>{Math.round(pkMeta.done/Math.max(1,pkMeta.dos)*100)}%</span>
            </div>
          </div>}

          {/* Bulk fill */}
          <div className="card2" style={{marginBottom:9,padding:'10px 12px'}}>
            <div style={{fontSize:'.62rem',color:'var(--accent)',fontWeight:700,marginBottom:7}}>⚡ Bulk Fill — apply to all {rows.length} filtered rows</div>
            <div style={{display:'flex',gap:7,marginBottom:7,alignItems:'flex-end',flexWrap:'wrap'}}>
              <div className="fg" style={{width:70}}>
                <label className="lbl">Start HH</label>
                <select value={bulkSH} onChange={e=>setBulkSH(e.target.value)} style={{height:30,fontSize:'.72rem',padding:'4px 6px'}}>{hrs.map(h=><option key={h}>{h}</option>)}</select>
              </div>
              <div className="fg" style={{width:70}}>
                <label className="lbl">MM</label>
                <select value={bulkSM} onChange={e=>setBulkSM(e.target.value)} style={{height:30,fontSize:'.72rem',padding:'4px 6px'}}>{mins.map(m=><option key={m}>{m}</option>)}</select>
              </div>
              <span style={{color:'var(--muted)',paddingBottom:4,fontSize:'.8rem'}}>→</span>
              <div className="fg" style={{width:70}}>
                <label className="lbl">End HH</label>
                <select value={bulkEH} onChange={e=>setBulkEH(e.target.value)} style={{height:30,fontSize:'.72rem',padding:'4px 6px'}}>{hrs.map(h=><option key={h}>{h}</option>)}</select>
              </div>
              <div className="fg" style={{width:70}}>
                <label className="lbl">MM</label>
                <select value={bulkEM} onChange={e=>setBulkEM(e.target.value)} style={{height:30,fontSize:'.72rem',padding:'4px 6px'}}>{mins.map(m=><option key={m}>{m}</option>)}</select>
              </div>
              <button className="btn btn-p btn-sm" onClick={applyBulk} style={{height:30,alignSelf:'flex-end'}}>Apply</button>
              <button className="btn btn-g btn-sm" onClick={clearAll} style={{height:30,alignSelf:'flex-end'}}>Clear All</button>
            </div>
          </div>

          {/* Bulk Excel upload */}
          <div className="exp">
            <div className="exp-h" onClick={()=>setBulkO(o=>!o)}>
              <span className="exp-ht">📥 Bulk Upload Actuals (Excel)</span>
              <span style={{color:'var(--muted)',fontSize:'.68rem'}}>{bulkO?'▲':'▼'}</span>
            </div>
            {bulkO&&<div className="exp-b">
              <div className="hint" style={{marginBottom:9}}>1. Download template → fill ACTUAL_DATE, ACTUAL_START, ACTUAL_END → 2. Re-upload</div>
              <div style={{display:'flex',gap:7,marginBottom:9}}>
                <div style={{display:'flex',gap:7,alignItems:'center',marginBottom:4}}>
                  <select id="actTplFilter" style={{height:31,width:'auto',fontSize:'.72rem'}}>
                    <option value="All">All DOs</option>
                    {['Planned','Done','Delayed','Not Picked','Cancelled'].map(s=><option key={s} value={s}>{s} only</option>)}
                  </select>
                  <a href="#" onClick={e=>{e.preventDefault();const f=document.getElementById('actTplFilter').value;window.location=`${API}/api/plans/${sel}/actuals-template-v2?status_filter=${encodeURIComponent(f)}`;}}>
                    <button className="btn btn-g btn-sm">⬇️ Download Actuals Template</button>
                  </a>
                </div>
              </div>
              <input type="file" accept=".xlsx,.xls" onChange={e=>setBulkF(e.target.files[0])} style={{marginBottom:8,fontSize:'.73rem'}}/>
              <button className="btn btn-p btn-sm" disabled={!bulkF||bulkS} onClick={bulkUpload}>
                {bulkS?<><Spin sm/>&nbsp;Uploading...</>:'💾 Upload & Save'}
              </button>
            </div>}
          </div>
        </>}
      </div>

      {detail&&<div>
        <div className="sec">Session Progress</div>
        <div className="g3" style={{gap:8,marginBottom:10}}>
          {[{l:'Shown',v:rows.length,c:'bl'},{l:'Filled',v:filled,c:'gr'},{l:'Remaining',v:rows.length-filled,c:'go'}]
            .map(k=><div key={k.l} className={`kpi ${k.c}`} style={{padding:'9px 11px'}}><div className="kl">{k.l}</div><div className="kv" style={{fontSize:'1.1rem'}}>{k.v}</div></div>)}
        </div>
        <div className="pb th" style={{marginBottom:10}}>
          <div className="pbf" style={{width:`${Math.round(filled/Math.max(1,rows.length)*100)}%`,background:'var(--green)'}}/>
        </div>
        <button className="btn btn-p btn-fw" disabled={saving||filled===0||!dirty} onClick={save}
          style={{opacity:dirty?1:.5,transition:'opacity .2s'}}>
          {saving?<><Spin sm/>&nbsp;Saving...</>:dirty?`💾 Save ${filled} Actual Time${filled!==1?'s':''}`:`✓ ${filled} Saved`}
        </button>
        <div className="hint" style={{marginTop:5,textAlign:'center'}}>Rows with both Start & End filled will be saved. Green = filled.</div>
      </div>}
    </div>

    {loading&&<div className="ctr" style={{padding:32}}><Spin/></div>}

    {!loading&&detail&&<>
      <div className="al al-i" style={{fontSize:'.73rem',marginBottom:9}}>
        ℹ️ All time inputs blank by default. Fill Start & End for completed DOs. Variance = Actual Duration − Planned Duration.
      </div>
      <div className="tw xl">
        <table className="dt"><thead><tr>
          <th>Status</th><th>DO No</th><th>Floor</th><th>Picker</th><th>P#</th><th>QTY</th>
          <th>Plan Start</th><th>Plan End</th>
          <th style={{background:'rgba(16,185,129,.06)',minWidth:105}}>Act Date</th>
          <th style={{background:'rgba(16,185,129,.06)',minWidth:85}}>Act Start</th>
          <th style={{background:'rgba(16,185,129,.06)',minWidth:85}}>Act End</th>
          <th style={{background:'rgba(16,185,129,.06)',minWidth:95}}>Notes</th>
          <th>Variance</th>
        </tr></thead><tbody>
          {rows.map(d=>{
            const t=times[d.do_no]||{};const hF=!!(t.start&&t.end);
            const vl=varLabel(d.start_time,d.end_time,t.start,t.end);
            return<tr key={d.do_no} style={hF?{background:'rgba(16,185,129,.03)'}:{}}>
              <td><SPill s={d.status||'Planned'}/></td>
              <td style={{fontWeight:700}}>{d.do_no}</td>
